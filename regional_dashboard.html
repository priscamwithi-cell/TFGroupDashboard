<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tearfund — Regional Workforce Profiles</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp, deleteDoc, doc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── PASTE YOUR FIREBASE CONFIG HERE ──
  const firebaseConfig = {
  apiKey: "AIzaSyAzdJrtQshBDsNzRH3YqtBSMm0g45W0RMU",
  authDomain: "tf-talent-hub.firebaseapp.com",
  databaseURL: "https://tf-talent-hub-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tf-talent-hub",
  storageBucket: "tf-talent-hub.firebasestorage.app",
  messagingSenderId: "422929352376",
  appId: "1:422929352376:web:d550d34a70364bf7d9564d"
};

  const PAGE_ID    = "regional_dashboard";
  const app        = initializeApp(firebaseConfig);
  const auth       = getAuth(app);
  const db         = getFirestore(app);
  let currentUser  = null;
  let selectedText = "";

  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    currentUser = user;
    document.getElementById("rd-user-email").textContent = user.email;
    if (user.photoURL) {
      const av = document.getElementById("rd-user-avatar");
      av.src = user.photoURL; av.style.display = "block";
    }
    loadComments();
  });

  // ── TEXT SELECTION → COMMENT PROMPT ──
  document.addEventListener('mouseup', () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 3) return;
    selectedText = sel.toString().trim().slice(0, 300);
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    const prompt = document.getElementById('rd-comment-prompt');
    prompt.style.top  = (rect.bottom + window.scrollY + 8) + 'px';
    prompt.style.left = Math.min(rect.left, window.innerWidth - 260) + 'px';
    prompt.style.display = 'block';
    document.getElementById('rd-prompt-preview').textContent = '"' + selectedText.slice(0,80) + (selectedText.length>80?'…':'') + '"';
  });
  window.addEventListener('scroll', () => { document.getElementById('rd-comment-prompt').style.display = 'none'; });

  window.rdDismissPrompt = () => { document.getElementById('rd-comment-prompt').style.display = 'none'; selectedText = ''; };

  window.rdOpenCommentPanel = () => {
    document.getElementById('rd-comment-prompt').style.display = 'none';
    document.getElementById('rd-comment-panel').classList.add('open');
    document.getElementById('rd-comment-quote').textContent = selectedText.slice(0,150) + (selectedText.length>150?'…':'');
    document.getElementById('rd-comment-input').focus();
  };

  window.rdCloseCommentPanel = () => {
    document.getElementById('rd-comment-panel').classList.remove('open');
    document.getElementById('rd-comment-input').value = '';
    selectedText = '';
  };

  window.rdSubmitComment = async () => {
    const text = document.getElementById('rd-comment-input').value.trim();
    if (!text || !currentUser) return;
    const btn = document.getElementById('rd-submit-btn');
    btn.disabled = true; btn.textContent = 'Posting…';
    try {
      await addDoc(collection(db, 'comments'), {
        page: PAGE_ID, quote: selectedText, comment: text,
        author: currentUser.email,
        authorName: currentUser.displayName || currentUser.email.split('@')[0],
        timestamp: serverTimestamp()
      });
      rdCloseCommentPanel(); loadComments();
    } catch(e) { alert('Failed: ' + e.message); }
    finally { btn.disabled = false; btn.textContent = 'Post Comment'; }
  };

  window.loadComments = async () => {
    const list = document.getElementById('rd-comments-list');
    list.innerHTML = '<div style="padding:1rem;font-size:.82rem;color:#4a7a8a;">Loading…</div>';
    try {
      const q = query(collection(db,'comments'), where('page','==',PAGE_ID), orderBy('timestamp','desc'));
      const snap = await getDocs(q);
      document.getElementById('rd-comment-count').textContent = snap.size || '0';
      if (snap.empty) { list.innerHTML = '<div style="padding:1.5rem 1rem;font-size:.82rem;color:#4a7a8a;text-align:center;">No comments yet. Select any text to add one.</div>'; return; }
      list.innerHTML = '';
      snap.forEach(docSnap => {
        const d = docSnap.data();
        const ts = d.timestamp?.toDate ? d.timestamp.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : 'Just now';
        const div = document.createElement('div');
        div.className = 'rd-comment-item';
        div.innerHTML = `<div class="rd-comment-quote">"${(d.quote||'').slice(0,100)}${(d.quote||'').length>100?'…':''}"</div>
          <div class="rd-comment-text">${d.comment}</div>
          <div class="rd-comment-meta"><span class="rd-comment-author">${d.authorName}</span><span class="rd-comment-time">${ts}</span>
          ${(currentUser && (currentUser.email === d.author)) ? `<button class="rd-comment-delete" onclick="rdDeleteComment('${docSnap.id}')">✕</button>` : ''}</div>`;
        list.appendChild(div);
      });
    } catch(e) { list.innerHTML = '<div style="padding:1rem;font-size:.82rem;color:#c0392b;">Could not load comments.</div>'; }
  };

  window.rdDeleteComment = async (id) => {
    if (!confirm('Delete this comment?')) return;
    try { await deleteDoc(doc(db,'comments',id)); loadComments(); } catch(e) { alert('Delete failed.'); }
  };

  window.rdToggleComments = () => {
    const s = document.getElementById('rd-comments-sidebar');
    s.classList.toggle('open');
    if (s.classList.contains('open')) loadComments();
  };
</script>
<style>
:root{
  --teal:#1088A8;--td:#0a6880;--tm:#1499bc;--tl:#d0edf4;--tp:#eaf6fa;
  --y:#F8D000;--yd:#d9b800;--yl:#fff7cc;
  --wh:#fff;--ink:#0d2b35;--ink2:#1e4a5a;--sl:#4a7a8a;--mi:#8ab5c2;--cl:#cce5ed;--fog:#f0f8fb;
  --sr:#1088A8;--mid:#F8D000;--jr:#E05A1E;
  --pm:#1a8a5a;--ft:#c0392b;--ok:#1a8a5a;--wn:#e67e22;--dg:#c0392b;
  --r:.4rem;--r2:.8rem;
  --sh:0 2px 10px rgba(16,136,168,.10),0 1px 3px rgba(13,43,53,.06);
  --shl:0 6px 32px rgba(16,136,168,.16),0 2px 8px rgba(13,43,53,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--fog);color:var(--ink);font-size:14px}

/* TOPBAR */
.topbar{background:var(--teal);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(16,136,168,.25)}

/* Dark mode */
body.dark-mode{--fog:#0f1f24;--wh:#162830;--cl:#1e4a5a;--tp:#0d2b35;--tl:#0f2d38;--ink:#e0eff3;--ink2:#b0cdd5;--sl:#6aacbc}
body.dark-mode .rsel{background:#0a1e24}

/* Theme toggle */
.theme-toggle-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:.3rem .6rem;font-size:.85rem;cursor:pointer;line-height:1;transition:background .2s}
.theme-toggle-btn:hover{background:rgba(255,255,255,.2)}

/* Back btn */
.hub-back-btn{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:.3rem .9rem;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;transition:background .2s;font-family:'Nunito Sans',sans-serif;text-decoration:none}
.hub-back-btn:hover{background:rgba(255,255,255,.22)}

/* Comments button */
.comments-topbar-btn{display:flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:.3rem .9rem;border-radius:20px;font-size:.75rem;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:background .2s}
.comments-topbar-btn:hover{background:rgba(255,255,255,.2)}
.comment-badge{background:var(--y);color:var(--td);font-size:.65rem;font-weight:800;padding:1px 6px;border-radius:10px}

/* Comment prompt */
.rd-prompt{display:none;position:absolute;z-index:500;background:#fff;border:1px solid var(--cl);border-radius:10px;padding:.8rem 1rem;box-shadow:0 8px 24px rgba(16,136,168,.18);max-width:250px}
.rd-prompt-preview{font-size:.75rem;color:#4a7a8a;font-style:italic;margin-bottom:.6rem;display:block}
.rd-prompt-btns{display:flex;gap:.5rem}
.rd-prompt-btn{font-size:.75rem;font-weight:700;font-family:'Nunito Sans',sans-serif;border:none;border-radius:6px;padding:.35rem .75rem;cursor:pointer}
.rd-prompt-btn-comment{background:#1088A8;color:#fff}
.rd-prompt-btn-dismiss{background:#f0f8fb;color:#4a7a8a}

/* Comment panel */
.rd-panel{position:fixed;top:0;right:-380px;width:360px;height:100vh;background:#fff;border-left:1px solid var(--cl);box-shadow:-4px 0 24px rgba(16,136,168,.12);z-index:400;display:flex;flex-direction:column;transition:right .3s ease}
.rd-panel.open{right:0}
.rd-panel-header{background:#1088A8;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
.rd-panel-header h3{font-family:'Nunito',sans-serif;color:#fff;font-size:.9rem;margin:0}
.rd-panel-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:1.2rem;cursor:pointer}
.rd-panel-close:hover{color:#fff}
.rd-panel-body{flex:1;overflow-y:auto;padding:1.2rem}
.rd-comment-quote{background:#eaf6fa;border-left:3px solid #1088A8;padding:.6rem .8rem;border-radius:0 6px 6px 0;font-size:.78rem;color:#4a7a8a;font-style:italic;margin-bottom:1rem}
#rd-comment-input{width:100%;border:1px solid var(--cl);border-radius:8px;padding:.75rem;font-family:'Nunito Sans',sans-serif;font-size:.85rem;color:var(--ink);resize:vertical;min-height:100px;background:var(--fog)}
#rd-comment-input:focus{outline:none;border-color:#1088A8}
#rd-submit-btn{width:100%;margin-top:.75rem;background:#1088A8;color:#fff;border:none;border-radius:8px;padding:.7rem;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer}
#rd-submit-btn:hover{background:#0a6880}
#rd-submit-btn:disabled{opacity:.6;cursor:not-allowed}
.rd-comment-item{background:#f0f8fb;border:1px solid var(--cl);border-radius:8px;padding:.9rem;margin-bottom:.75rem}
.rd-comment-text{font-size:.85rem;color:var(--ink);margin-bottom:.5rem;line-height:1.5}
.rd-comment-meta{display:flex;align-items:center;gap:.75rem;font-size:.72rem}
.rd-comment-author{font-weight:700;color:#0a6880}
.rd-comment-time{color:#4a7a8a}
.rd-comment-delete{margin-left:auto;background:none;border:none;color:#c0392b;cursor:pointer;font-size:.75rem;opacity:.6}
.rd-comment-delete:hover{opacity:1}
.logo-badge{background:var(--y);border-radius:6px;padding:4px 12px}
.logo-text{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;color:var(--teal)}
.brand-title{font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;color:#fff;margin-left:.75rem}
.brand-sub{font-size:.72rem;color:rgba(255,255,255,.7);margin-left:.75rem}
.topbar-badge{background:rgba(248,208,0,.2);border:1px solid rgba(248,208,0,.4);color:var(--y);font-size:.7rem;font-weight:700;padding:.2rem .65rem;border-radius:20px}

/* REGION SELECTOR */
.rsel{background:var(--td);padding:.7rem 2rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;border-bottom:3px solid var(--y);position:sticky;top:64px;z-index:190}
.rsel-label{font-size:.65rem;font-weight:900;color:var(--y);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.rbtn{font-family:'Nunito',sans-serif;font-size:.79rem;font-weight:700;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);padding:.35rem .95rem;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.rbtn:hover{background:rgba(255,255,255,.18);color:#fff}
.rbtn.active{background:var(--y);border-color:var(--y);color:var(--td)}

/* MAIN */
.main{padding:1.25rem 2rem 3rem;max-width:1440px;margin:0 auto}

/* TWO-PANEL LAYOUT */
.layout{display:grid;grid-template-columns:340px 1fr;gap:1rem;align-items:start}

/* COUNTRY LIST */
.country-list{background:var(--wh);border-radius:var(--r2);box-shadow:var(--sh);border:1px solid var(--cl);overflow:hidden;position:sticky;top:130px}
.cl-header{background:var(--td);padding:.75rem 1rem;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;color:var(--y);text-transform:uppercase;letter-spacing:.08em}
.cl-region-row{display:flex;align-items:center;padding:.65rem 1rem;background:var(--tp);border-bottom:1px solid var(--cl);cursor:pointer;transition:background .15s;gap:.65rem}
.cl-region-row:hover,.cl-region-row.active{background:var(--tl)}
.cl-region-row.active{border-left:3px solid var(--teal)}
.cl-country-row{display:flex;align-items:center;padding:.5rem 1rem .5rem 1.6rem;border-bottom:1px solid var(--fog);cursor:pointer;transition:background .15s;gap:.6rem}
.cl-country-row:hover{background:var(--tp)}
.cl-country-row.active{background:var(--tl);border-left:3px solid var(--teal)}
.cl-name{flex:1;font-size:.76rem;font-weight:600;color:var(--ink2)}
.cl-count{font-size:.68rem;font-weight:700;font-family:'Nunito',sans-serif;color:var(--sl)}
.cl-sr{font-size:.65rem;padding:.15rem .4rem;border-radius:8px;font-weight:700}

/* DETAIL PANEL */
.detail-panel{min-width:0}

/* PROFILE HEADER */
.profile-hdr{background:var(--td);border-radius:var(--r2);padding:1.1rem 1.3rem;margin-bottom:1rem;border-left:5px solid var(--y)}
.profile-name{font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:900;color:#fff}
.profile-sub{font-size:.75rem;color:rgba(255,255,255,.65);margin-top:.2rem}
.profile-breadcrumb{font-size:.68rem;color:var(--y);font-weight:700;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.06em}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:.6rem;margin-bottom:.9rem}
@media(max-width:1300px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi{background:var(--wh);border-radius:var(--r2);padding:.8rem .75rem .65rem;box-shadow:var(--sh);border:1px solid var(--cl);border-top:3px solid var(--accent,var(--teal))}
.kpi-v{font-family:'Nunito',sans-serif;font-size:1.75rem;font-weight:900;color:var(--td);letter-spacing:-.04em;line-height:1}
.kpi-v sup{font-size:.75rem;vertical-align:top;padding-top:.28rem;display:inline-block}
.kpi-l{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sl);margin-top:.25rem}
.kpi-s{font-size:.61rem;color:var(--mi);margin-top:.08rem}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.9rem;margin-bottom:.9rem}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:.9rem;margin-bottom:.9rem}

/* CARD */
.card{background:var(--wh);border-radius:var(--r2);padding:1rem;box-shadow:var(--sh);border:1px solid var(--cl)}
.ct{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;color:var(--td);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.1rem}
.cs{font-size:.66rem;color:var(--sl);margin-bottom:.75rem}
.chart-wrap{position:relative}

/* STACKED BARS */
.srow{display:grid;grid-template-columns:120px 1fr 44px;align-items:center;gap:.5rem;padding:.22rem .1rem;border-radius:var(--r);cursor:default;transition:background .12s}
.srow:hover{background:var(--tp)}
.slabel{font-size:.69rem;font-weight:600;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strack{height:18px;border-radius:4px;overflow:hidden;display:flex;background:var(--fog)}
.sseg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.54rem;font-weight:800;color:rgba(255,255,255,.9)}
.scount{font-size:.67rem;font-weight:700;color:var(--sl);text-align:right}

/* PROG BARS */
.prow{display:flex;align-items:center;gap:.55rem;padding:.22rem 0}
.plabel{font-size:.68rem;width:110px;flex-shrink:0;color:var(--ink2);font-weight:600}
.ptrack{flex:1;height:7px;background:var(--fog);border-radius:4px;overflow:hidden;border:1px solid var(--cl)}
.pfill{height:100%;border-radius:4px}
.pval{font-size:.67rem;width:36px;text-align:right;font-weight:800;color:var(--td);font-family:'Nunito',sans-serif}

/* TABLE */
.dtable{width:100%;border-collapse:collapse;font-size:.7rem}
.dtable th{font-size:.61rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);padding:.38rem .5rem;text-align:left;border-bottom:2px solid var(--tl)}
.dtable td{padding:.32rem .5rem;border-bottom:1px solid var(--fog);color:var(--ink2);vertical-align:middle}
.dtable tr:hover td{background:var(--tp)}
.dtable td.n{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-family:'Nunito',sans-serif}

/* BADGE */
.vbadge{display:inline-flex;align-items:center;font-size:.61rem;font-weight:700;padding:.1rem .4rem;border-radius:8px;margin-left:.3rem}
.vup{background:#e8f8f0;color:var(--ok)}
.vdn{background:#fdeee6;color:var(--dg)}
.vne{background:var(--fog);color:var(--sl)}

/* INSIGHT */
.ins{border-radius:var(--r);padding:.55rem .75rem;margin-top:.6rem;font-size:.73rem;line-height:1.6}
.ins-alert{background:#fdeee6;border-left:3px solid var(--dg);color:#7a2010}
.ins-warn{background:#fff8e8;border-left:3px solid var(--yd);color:#7a5800}
.ins-ok{background:#e8f8f0;border-left:3px solid var(--ok);color:#0a5a2a}
.ins-info{background:var(--tp);border-left:3px solid var(--teal);color:var(--td)}

/* NET FLOW BOX */
.flow-row{display:flex;gap:.6rem;margin-bottom:.75rem}
.flow-box{flex:1;background:var(--fog);border-radius:var(--r);padding:.55rem .6rem;text-align:center;border:1px solid var(--cl)}
.flow-v{font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:900;line-height:1}
.flow-l{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--sl);margin-top:.15rem}

/* GRADE PYR */
.pyr-row{display:flex;align-items:center;gap:.5rem;padding:.2rem 0}
.pyr-label{font-size:.67rem;width:75px;text-align:right;color:var(--ink2);font-weight:600}
.pyr-bar{height:18px;border-radius:0 4px 4px 0;display:flex;align-items:center;padding-right:5px;justify-content:flex-end;min-width:4px;transition:width .4s}
.pyr-n{font-size:.58rem;font-weight:800;color:#fff}
.pyr-ext{font-size:.58rem;font-weight:800;padding-left:4px}
.pyr-pct{font-size:.63rem;font-weight:700;width:45px;text-align:right;color:var(--sl);font-family:'Nunito',sans-serif}

/* SECTION LABEL */
.slb{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--teal);margin-bottom:.35rem;padding-bottom:.25rem;border-bottom:1px solid var(--cl)}

/* COUNTRY NOTE */
.small-n-note{background:var(--yl);border:1px solid var(--yd);border-radius:var(--r);padding:.4rem .65rem;font-size:.69rem;color:#7a5800;margin-bottom:.75rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .2s ease both}

@media(max-width:1050px){.layout{grid-template-columns:1fr}.country-list{position:static}}

/* DEMO TAB TOGGLE */
.demo-tabs{display:flex;gap:.4rem;margin:.9rem 0 .5rem;border-bottom:2px solid var(--cl)}
.demo-tab{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;padding:.35rem .9rem;border-radius:var(--r) var(--r) 0 0;cursor:pointer;background:var(--fog);color:var(--sl);border:1px solid var(--cl);border-bottom:none;transition:all .15s}
.demo-tab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.demo-tab:hover:not(.active){background:var(--tl);color:var(--td)}
.demo-panel{display:none}.demo-panel.active{display:block}
.demo-note{font-size:.66rem;color:var(--mi);font-style:italic;margin-bottom:.6rem}
</style>
</head>
<body>
<div style="height:4px;background:var(--y)"></div>

<nav class="topbar">
  <div style="display:flex;align-items:center;gap:.75rem">
    <a href="index.html" class="hub-back-btn">← Hub</a>
    <div class="logo-badge"><span class="logo-text">tearfund</span></div>
    <div style="width:1px;height:22px;background:rgba(255,255,255,.25)"></div>
    <div>
      <div class="brand-title">Regional Workforce Profiles</div>
      <div class="brand-sub">People &amp; Culture · December 2025</div>
    </div>
  </div>

const CAT_COL={Senior:'#1088A8',Mid:'#F8D000',Junior:'#E05A1E'};
const TORD=['< 1 yr','1–3 yrs','3–5 yrs','5–10 yrs','10+ yrs'];
const TCOL=['#c0392b','#e67e22','#d9b800','#1a8a5a','#1088A8'];
const GRADE_ORDER=['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9','Grade 10'];

let currentRegion=null, currentCountry=null, charts={};

function pct(v,t){return t?Math.round(v/t*1000)/10:0}
function vb(val,orgVal,higherGood=true){
  const d=val-orgVal;
  if(Math.abs(d)<1.5) return `<span class="vbadge vne">≈ avg</span>`;
  const better=higherGood?d>0:d<0;
  return `<span class="vbadge ${better?'vup':'vdn'}">${d>0?'+':''}${d.toFixed(0)}pp</span>`;
}
function getCat(g){return ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2'].includes(g)?'Senior':['Grade 3','Grade 4','Grade 5'].includes(g)?'Mid':'Junior'}

function killCharts(){Object.values(charts).forEach(c=>c.destroy());charts={};window._currentDemoData=null;}

// ── COUNTRY LIST ──────────────────────────────────────────────────
function buildCountryList(rkey){
  const r=DATA[rkey];
  const countries=Object.entries(r.countries).sort((a,b)=>b[1].n-a[1].n);
  let html=`<div class="cl-header">📍 ${r.label} · ${r.n} staff</div>`;
  // Region summary row
  html+=`<div class="cl-region-row active" id="cl-region" onclick="showRegion('${rkey}')">
    <div style="flex:1">
      <div class="cl-name" style="font-size:.78rem;font-weight:800;color:var(--ink)">${r.label}</div>
      <div style="font-size:.63rem;color:var(--sl)">All ${r.n} staff · ${r.sr_pct}% senior</div>
    </div>
    <span class="cl-sr" style="background:${r.sr_pct>=28?'#e8f8f0':'#fdeee6'};color:${r.sr_pct>=28?'var(--ok)':'var(--dg)'}">${r.sr_pct}%</span>
  </div>`;
  // Countries
  countries.forEach(([cname,cd])=>{
    const srCol=cd.sr_pct>=28?'#e8f8f0':'#fdeee6';
    const srTxt=cd.sr_pct>=28?'var(--ok)':'var(--dg)';
    html+=`<div class="cl-country-row" id="cl-${CSS.escape(cname)}" onclick="showCountry('${rkey}','${cname.replace(/'/g,"\\'")}')">
      <div style="flex:1">
        <div class="cl-name">${cname}</div>
        <div style="font-size:.62rem;color:var(--sl)">${cd.n} staff · FT ${cd.ft_pct}%</div>
      </div>
      <span class="cl-sr" style="background:${srCol};color:${srTxt}">${cd.sr_pct}%</span>
    </div>`;
  });
  document.getElementById('country-list').innerHTML=html;
}

function setActive(id){
  document.querySelectorAll('.cl-region-row,.cl-country-row').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
}

// ── SHOW REGION ───────────────────────────────────────────────────
function showRegion(rkey){
  currentCountry=null;
  setActive('cl-region');
  renderProfile(DATA[rkey],DATA[rkey].label,'region',rkey);
}

// ── SHOW COUNTRY ──────────────────────────────────────────────────
function showCountry(rkey,cname){
  currentCountry=cname;
  setActive('cl-'+CSS.escape(cname));
  const cd=DATA[rkey].countries[cname];
  renderProfile(cd,cname,'country',rkey,cname);
}

// ── RENDER PROFILE ────────────────────────────────────────────────
function renderProfile(d,name,type,rkey,cname){
  killCharts();
  const r=DATA[rkey];
  const isSmall=d.n<5;
  const netCol=d.net_flow>=0?'var(--ok)':'var(--dg)';
  const gradePairs=Object.entries(d.grade_cts||{}).filter(([g,n])=>n>0);
  const gradeEntries=GRADE_ORDER.filter(g=>d.grade_cts&&d.grade_cts[g]>0).map(g=>({g,n:d.grade_cts[g]}));
  const maxGrade=gradeEntries.length?Math.max(...gradeEntries.map(e=>e.n)):1;
  const tenureEntries=TORD.map((b,i)=>({b,n:d.tenure&&d.tenure[b]?d.tenure[b]:0,c:TCOL[i]}));
  const hireGrades=Object.entries(d.hire_by_grade||{}).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]);
  const cEntries=Object.entries(r.countries).sort((a,b)=>b[1].n-a[1].n);

  let html=`<div class="fade-in">`;

  // HEADER
  html+=`<div class="profile-hdr">
    ${type==='country'?`<div class="profile-breadcrumb">📍 ${r.label} › ${name}</div>`:`<div class="profile-breadcrumb">🌍 Region Overview</div>`}
    <div class="profile-name">${name}</div>
    <div class="profile-sub">${d.n} staff ${type==='region'?`· ${Object.keys(r.countries).length} countries`:''}
      ${type==='region'?`· ${d.sr_pct}% senior · ${d.ft_pct}% fixed-term`:
        `· <span style="color:rgba(255,255,255,.6)">${r.label}</span>`}
    </div>
  </div>`;

  if(isSmall) html+=`<div class="small-n-note">⚠ Small sample (n=${d.n}) — percentages are sensitive to individual moves. Interpret with caution.</div>`;

  // KPIs
  html+=`<div class="kpi-grid">
    <div class="kpi" style="--accent:${r.color}"><div class="kpi-v">${d.n}</div><div class="kpi-l">Staff</div><div class="kpi-s">${type==='region'?Object.keys(r.countries).length+' countries':r.label}</div></div>
    <div class="kpi" style="--accent:var(--sr)"><div class="kpi-v">${d.sr_pct}<sup>%</sup></div><div class="kpi-l">Senior</div><div class="kpi-s">${d.senior_n} staff ${vb(d.sr_pct,ORG.sr_pct)}</div></div>
    <div class="kpi" style="--accent:var(--pm)"><div class="kpi-v">${d.perm_pct}<sup>%</sup></div><div class="kpi-l">Permanent</div><div class="kpi-s">${d.perm_n} staff ${vb(d.perm_pct,ORG.perm_pct)}</div></div>
    <div class="kpi" style="--accent:var(--dg)"><div class="kpi-v">${d.exit_rate}<sup>%</sup></div><div class="kpi-l">Exit Rate</div><div class="kpi-s">${d.exits_n} exits ${vb(d.exit_rate,ORG.exit_rate,false)}</div></div>
    <div class="kpi" style="--accent:var(--teal)"><div class="kpi-v">${d.hire_rate_12m}<sup>%</sup></div><div class="kpi-l">Hire Rate 12m</div><div class="kpi-s">${d.hire_12m} hires · CSD-based</div></div>
    <div class="kpi" style="--accent:${d.net_flow>=0?'var(--pm)':'var(--dg)'}"><div class="kpi-v" style="color:${netCol}">${d.net_flow>=0?'+':''}${d.net_flow}</div><div class="kpi-l">Net Flow</div><div class="kpi-s">Hires minus exits</div></div>
  </div>`;

  // GRADE + CONTRACT + TENURE
  html+=`<div class="g3">
    <div class="card">
      <div class="ct">Grade Distribution</div><div class="cs">Senior · Mid · Junior</div>
      <div class="chart-wrap" style="height:150px"><canvas id="grade-donut"></canvas></div>
      <div style="margin-top:.5rem">
        ${[['Senior',d.senior_n,'#1088A8'],['Mid',d.mid_n,'#F8D000'],['Junior',d.junior_n,'#E05A1E']].map(([l,n,c])=>`
        <div style="display:flex;align-items:center;gap:.4rem;padding:.12rem 0">
          <span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span>
          <span style="flex:1;font-size:.69rem;font-weight:600;color:var(--ink2)">${l}</span>
          <span style="font-size:.7rem;font-weight:800;font-family:'Nunito',sans-serif;color:var(--ink)">${n}</span>
          <span style="font-size:.65rem;color:var(--sl)">${pct(n,d.n)}%</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="ct">Contract Type</div><div class="cs">Permanent vs Fixed Term</div>
      <div class="chart-wrap" style="height:150px"><canvas id="contract-donut"></canvas></div>
      <div style="margin-top:.5rem">
        ${[[`Permanent`,d.perm_n,'#1a8a5a'],[`Fixed Term`,d.ft_n,'#c0392b'],[`Other`,d.n-d.perm_n-d.ft_n,'#8ab5c2']].filter(x=>x[1]>0).map(([l,n,c])=>`
        <div style="display:flex;align-items:center;gap:.4rem;padding:.12rem 0">
          <span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span>
          <span style="flex:1;font-size:.69rem;font-weight:600;color:var(--ink2)">${l}</span>
          <span style="font-size:.7rem;font-weight:800;font-family:'Nunito',sans-serif;color:var(--ink)">${n}</span>
          <span style="font-size:.65rem;color:var(--sl)">${pct(n,d.n)}%</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="ct">Tenure Distribution</div><div class="cs">Length of service bands</div>
      <div class="chart-wrap" style="height:150px"><canvas id="tenure-bar"></canvas></div>
      <div style="margin-top:.4rem;display:flex;flex-wrap:wrap;gap:.3rem">
        ${TORD.map((b,i)=>`<span style="font-size:.62rem;color:var(--sl)"><span style="display:inline-block;width:7px;height:7px;border-radius:2px;background:${TCOL[i]};margin-right:2px;vertical-align:middle"></span>${b}: ${d.tenure&&d.tenure[b]||0}</span>`).join('')}
      </div>
    </div>
  </div>`;

  // GRADE PYRAMID
  html+=`<div class="g21">
    <div class="card">
      <div class="ct">Full Grade Pyramid</div><div class="cs">All grades in ${name} — lower = more senior</div>
      <div style="padding:.2rem 0">
        ${gradeEntries.map(e=>{
          const cat=getCat(e.g);
          const col=CAT_COL[cat]||'#8ab5c2';
          const w=Math.max(4,(e.n/maxGrade*75));
          return `<div class="pyr-row">
            <div class="pyr-label">${e.g}</div>
            <div style="flex:1;display:flex;align-items:center">
              <div class="pyr-bar" style="width:${w}%;background:${col}">
                ${w>=10?`<span class="pyr-n">${e.n}</span>`:''}
              </div>
              ${w<10?`<span class="pyr-ext" style="color:${col}">${e.n}</span>`:''}
            </div>
            <div class="pyr-pct">${e.n} · ${pct(e.n,d.n)}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.9rem">
      <!-- NET FLOW -->
      <div class="card">
        <div class="ct">Workforce Flow</div><div class="cs">Hires vs exits · CSD-based</div>
        <div class="flow-row">
          <div class="flow-box"><div class="flow-v" style="color:var(--teal)">${d.hire_12m}</div><div class="flow-l">Hires 12m</div></div>
          <div class="flow-box"><div class="flow-v" style="color:var(--dg)">${d.exits_n}</div><div class="flow-l">Exits</div></div>
          <div class="flow-box" style="border-color:${netCol}"><div class="flow-v" style="color:${netCol}">${d.net_flow>=0?'+':''}${d.net_flow}</div><div class="flow-l">Net Flow</div></div>
        </div>
        ${hireGrades.length?`
        <div class="slb">Entry grades (12m hires)</div>
        ${hireGrades.map(([g,n])=>{
          const maxH=Math.max(...hireGrades.map(x=>x[1]));
          return `<div class="prow"><div class="plabel" style="width:90px">${g}</div>
            <div class="ptrack"><div class="pfill" style="width:${(n/maxH*100).toFixed(0)}%;background:var(--teal)"></div></div>
            <div class="pval">${n}</div></div>`;
        }).join('')}`:'<div style="font-size:.72rem;color:var(--mi);text-align:center;padding:.75rem 0">No hires in 12-month window</div>'}
      </div>
      <!-- MOBILITY -->
      <div class="card">
        <div class="ct">Mobility</div><div class="cs">Grade changes in mobility data</div>
        <div style="display:flex;gap:.6rem">
          <div class="flow-box" style="border-color:var(--ok)"><div class="flow-v" style="color:var(--ok)">${d.mob_up}</div><div class="flow-l">Upward</div></div>
          <div class="flow-box" style="border-color:var(--dg)"><div class="flow-v" style="color:var(--dg)">${d.mob_dn}</div><div class="flow-l">Downward</div></div>
        </div>
      </div>
    </div>
  </div>`;

  // COUNTRY COMPARISON TABLE (region view only)
  if(type==='region' && cEntries.length>1){
    html+=`<div class="card" style="margin-bottom:.9rem">
      <div class="ct">Country Comparison</div>
      <div class="cs">All countries in ${name} · click a row to drill down</div>
      <table class="dtable">
        <thead><tr>
          <th>Country</th><th class="n">N</th><th class="n">Senior %</th><th class="n">Perm %</th><th class="n">FT %</th>
          <th class="n">Exit Rate</th><th class="n">Hire Rate</th><th class="n">Net Flow</th><th class="n">Mob ↑</th>
        </tr></thead>
        <tbody>
          ${cEntries.map(([cn,cd])=>{
            const srC=cd.sr_pct>=28?'color:var(--ok)':cd.sr_pct<10?'color:var(--dg)':'';
            const ftC=cd.ft_pct>=90?'color:var(--dg);font-weight:800':cd.ft_pct>=70?'color:var(--wn)':'';
            const exC=cd.exit_rate>=40?'color:var(--dg);font-weight:800':cd.exit_rate>=20?'color:var(--wn)':'';
            const nfC=cd.net_flow>=0?'color:var(--ok)':'color:var(--dg)';
            return `<tr onclick="showCountry('${rkey}','${cn.replace(/'/g,"\\'")}')" style="cursor:pointer">
              <td style="font-weight:600">${cn}</td>
              <td class="n">${cd.n}</td>
              <td class="n" style="${srC}">${cd.sr_pct}%</td>
              <td class="n" style="${cd.perm_pct<10?'color:var(--dg)':''}">${cd.perm_pct}%</td>
              <td class="n" style="${ftC}">${cd.ft_pct}%</td>
              <td class="n" style="${exC}">${cd.exit_rate}%</td>
              <td class="n">${cd.hire_rate_12m}%</td>
              <td class="n" style="${nfC}">${cd.net_flow>=0?'+':''}${cd.net_flow}</td>
              <td class="n" style="color:var(--ok)">${cd.mob_up}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }


  // Inject demographics section
  // For region view: aggregate age_grade from all countries (region-level object only has age_totals)
  let demoData = type==='country'
    ? (DEMO[rkey]&&DEMO[rkey].countries&&DEMO[rkey].countries[name]||null)
    : (DEMO[rkey]||null);
  if(demoData && !demoData.age_grade && demoData.countries){
    const agg={};
    Object.values(demoData.countries).forEach(cd=>{
      Object.entries(cd.age_grade||{}).forEach(([grade,ages])=>{
        if(!agg[grade]) agg[grade]={};
        Object.entries(ages).forEach(([age,n])=>{ agg[grade][age]=(agg[grade][age]||0)+n; });
      });
    });
    demoData = Object.assign({}, demoData, {age_grade: agg});
  }
  const demoN = demoData ? demoData.total : 0;

  if(demoData){
    html+=`
    <div class="card" style="margin-bottom:.9rem">
      <div class="ct">Demographics — Gender &amp; Age by Grade</div>
      <div class="cs">Report 69 (30 Dec 2025) · ${type==='country'?name:name+' region'} · ${demoN} staff with demographic data</div>
      <div class="demo-tabs">
        <div class="demo-tab active" onclick="switchDemoTab(this,'dp-gg')">Gender × Grade</div>
        <div class="demo-tab" onclick="switchDemoTab(this,'dp-ag')">Age × Grade</div>
        <div class="demo-tab" onclick="switchDemoTab(this,'dp-ov')">Overview</div>
      </div>
      <div class="demo-panel active" id="dp-gg">
        <div class="demo-note">Female (pink) and Male (teal) count within each grade · labels show count</div>
        <div id="demo-gg-bars"></div>
      </div>
      <div class="demo-panel" id="dp-ag">
        <div class="demo-note">Age band distribution within each grade — stacked bars</div>
        <div class="chart-wrap" style="height:${Object.keys(demoData.age_grade||{}).length*32+40}px"><canvas id="demo-ag-chart"></canvas></div>
      </div>
      <div class="demo-panel" id="dp-ov">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem">
          <div><div class="slb">Gender split</div><div id="demo-ov-gender"></div></div>
          <div><div class="slb">Age distribution</div><div id="demo-ov-age"></div></div>
        </div>
      </div>
    </div>`;
  }

  html+=`</div>`;
  document.getElementById('detail-panel').innerHTML=html;

  // Store demo data for panel builders
  window._currentDemoData = demoData || null;
  // Auto-build the default Gender×Grade panel if data available
  if(demoData){ setTimeout(()=>buildGenderGrade(demoData),0); }

  // ── CHARTS ────────────────────────────────────────────────────
  Chart.defaults.font.family="'Nunito Sans',sans-serif";
  Chart.defaults.font.size=11;
  Chart.defaults.color='#4a7a8a';
  Chart.defaults.plugins.legend.display=false;
  Chart.defaults.plugins.tooltip.backgroundColor='#0a6880';
  Chart.defaults.plugins.tooltip.cornerRadius=6;
  Chart.defaults.plugins.tooltip.padding=8;

  const dlBase={color:'#fff',textAlign:'center',font:{weight:'bold',size:11,family:"'Nunito',sans-serif"},formatter:(v,ctx)=>v>0?`${v}\n${pct(v,d.n)}%`:'',display:ctx=>ctx.dataset.data[ctx.dataIndex]>0};

  // Grade donut
  charts['grade-donut']=new Chart(document.getElementById('grade-donut'),{
    type:'doughnut',
    data:{labels:['Senior','Mid','Junior'],datasets:[{data:[d.senior_n,d.mid_n,d.junior_n],backgroundColor:['#1088A8','#F8D000','#E05A1E'],borderWidth:3,borderColor:'#fff'}]},
    options:{cutout:'65%',animation:{duration:500},plugins:{tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} (${pct(c.raw,d.n)}%)`}},datalabels:dlBase}}
  });

  // Contract donut
  const cArr=[{l:'Permanent',n:d.perm_n,c:'#1a8a5a'},{l:'Fixed Term',n:d.ft_n,c:'#c0392b'},{l:'Other',n:d.n-d.perm_n-d.ft_n,c:'#8ab5c2'}].filter(x=>x.n>0);
  charts['contract-donut']=new Chart(document.getElementById('contract-donut'),{
    type:'doughnut',
    data:{labels:cArr.map(x=>x.l),datasets:[{data:cArr.map(x=>x.n),backgroundColor:cArr.map(x=>x.c),borderWidth:3,borderColor:'#fff'}]},
    options:{cutout:'65%',animation:{duration:500},plugins:{tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} (${pct(c.raw,d.n)}%)`}},datalabels:dlBase}}
  });

  // Tenure bar
  charts['tenure-bar']=new Chart(document.getElementById('tenure-bar'),{
    type:'bar',
    data:{labels:TORD,datasets:[{data:tenureEntries.map(e=>e.n),backgroundColor:TCOL,borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:16}},
      scales:{y:{display:false,grid:{display:false}},x:{grid:{display:false},border:{display:false},ticks:{font:{size:9}}}},
      plugins:{tooltip:{callbacks:{label:c=>`${c.raw} staff (${pct(c.raw,d.n)}%)`}},
        datalabels:{anchor:'end',align:'top',offset:-2,color:'var(--ink2)',font:{weight:'bold',size:10},formatter:v=>v>0?v:''}}
    }
  });
}


// ── DEMO TAB TOGGLE ───────────────────────────────────────────────
function switchDemoTab(btn, panelId){
  btn.closest('.demo-tabs').querySelectorAll('.demo-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const card = btn.closest('.card');
  card.querySelectorAll('.demo-panel').forEach(p=>p.classList.remove('active'));
  const target = card.querySelector('#'+panelId);
  if(target){ target.classList.add('active'); buildDemoPanel(panelId); }
}

// ── DEMO PANEL BUILDERS ───────────────────────────────────────────
let demoDataCache = null;
const AGE_BANDS  = ['19-25','26-35','36-45','46-60','60+'];
const AGE_COLORS = ['#c0392b','#e67e22','#1088A8','#27ae60','#8e44ad'];
const GRADE_ORDER_D = ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9','Grade 10'];
const F_COL = '#E91E8C';
const M_COL = '#1088A8';

function getDemoData(){
  // Re-read from the current rendered profile's demoData variable
  // We store it on window when rendering
  return window._currentDemoData || null;
}

function buildDemoPanel(panelId){
  const d = window._currentDemoData;
  if(!d) return;

  if(panelId==='dp-gg') buildGenderGrade(d);
  if(panelId==='dp-ag') buildAgeGrade(d);
  if(panelId==='dp-ov') buildDemoOverview(d);
}

function buildGenderGrade(d){
  const el = document.getElementById('demo-gg-bars');
  if(!el || !d.gender_grade) return;
  const grades = GRADE_ORDER_D.filter(g => d.gender_grade[g]);
  const maxN = Math.max(...grades.map(g=>(d.gender_grade[g].f||0)+(d.gender_grade[g].m||0)));
  el.innerHTML = grades.map(g => {
    const gd = d.gender_grade[g];
    const f = gd.f||0, m = gd.m||0, tot = f+m;
    const fp = tot ? (f/tot*100).toFixed(1) : 0;
    const mp = tot ? (m/tot*100).toFixed(1) : 0;
    const barW = (tot/maxN*100).toFixed(1);
    const isSenior = ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2'].includes(g);
    return `<div style="display:grid;grid-template-columns:80px 1fr 52px;align-items:center;gap:.5rem;padding:.22rem 0">
      <div style="font-size:.7rem;font-weight:${isSenior?'700':'500'};color:${isSenior?'var(--teal-dark)':'var(--ink2)'};text-align:right">${g}</div>
      <div style="height:20px;border-radius:4px;overflow:hidden;display:flex;background:var(--fog)" title="${g}: F=${f}, M=${m}">
        <div style="width:${barW}%;display:flex;overflow:hidden;border-radius:4px;height:100%">
          ${f>0?`<div style="width:${fp}%;background:${F_COL};display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff">${fp>=10?f:''}</div>`:''}
          ${m>0?`<div style="width:${mp}%;background:${M_COL};display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff">${mp>=10?m:''}</div>`:''}
        </div>
      </div>
      <div style="font-size:.67rem;color:var(--slate);font-weight:700;text-align:right">${tot}</div>
    </div>`;
  }).join('') +
  `<div style="display:flex;gap:1rem;margin-top:.4rem;font-size:.66rem;color:var(--slate)">
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${F_COL};margin-right:3px;vertical-align:middle"></span>Female</span>
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${M_COL};margin-right:3px;vertical-align:middle"></span>Male</span>
  </div>`;
}

function buildAgeGrade(d){
  const canvasEl = document.getElementById('demo-ag-chart');
  if(!canvasEl || !d.age_grade) return;
  if(charts['demo-ag']){ charts['demo-ag'].destroy(); delete charts['demo-ag']; }

  const grades = GRADE_ORDER_D.filter(g => d.age_grade[g]);
  const datasets = AGE_BANDS.map((age,i) => ({
    label: age,
    data: grades.map(g => (d.age_grade[g]&&d.age_grade[g][age]) || 0),
    backgroundColor: AGE_COLORS[i],
    borderWidth: 0,
    borderRadius: 2,
  })).filter(ds => ds.data.some(v=>v>0));

  charts['demo-ag'] = new Chart(canvasEl, {
    type: 'bar',
    data: { labels: grades, datasets },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { stacked:true, grid:{color:'rgba(16,136,168,.07)'}, border:{display:false},
             ticks:{stepSize:1, font:{size:9}} },
        y: { stacked:true, grid:{display:false}, border:{display:false},
             ticks:{font:{size:9}, color: ctx => {
               const lbl = grades[ctx.index];
               return ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2'].includes(lbl) ? '#0a6880' : '#4a7a8a';
             }}}
      },
      plugins: {
        legend: { display:true, position:'bottom',
          labels:{font:{size:9,family:"'Nunito Sans',sans-serif"}, boxWidth:10, padding:8} },
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.raw}` } },
        datalabels: {
          color:'#fff', font:{weight:'bold',size:9},
          formatter: v => v>0?v:'',
          display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
        }
      },
      layout: { padding:{top:4,right:8} }
    }
  });
}

function buildDemoOverview(d){
  // Gender overview
  const govEl = document.getElementById('demo-ov-gender');
  if(govEl){
    const tot = (d.female||0)+(d.male||0);
    const fp = tot ? (d.female/tot*100).toFixed(1) : 0;
    const mp = tot ? (d.male/tot*100).toFixed(1) : 0;
    govEl.innerHTML = `
    <div style="height:22px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:.5rem">
      <div style="width:${fp}%;background:${F_COL};display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff">${fp}%</div>
      <div style="width:${mp}%;background:${M_COL};display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff">${mp}%</div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.69rem;color:var(--slate)">
      <span style="color:${F_COL};font-weight:700">Female: ${d.female||0} (${fp}%)</span>
      <span style="color:${M_COL};font-weight:700">Male: ${d.male||0} (${mp}%)</span>
    </div>`;
  }
  // Age overview
  const aovEl = document.getElementById('demo-ov-age');
  if(aovEl && d.age_totals){
    const totAge = Object.values(d.age_totals).reduce((a,b)=>a+b,0);
    const maxAge = Math.max(...Object.values(d.age_totals));
    aovEl.innerHTML = AGE_BANDS.filter(b=>d.age_totals[b]).map((b,i)=>{
      const n = d.age_totals[b]||0;
      const w = (n/maxAge*100).toFixed(0);
      const pct = totAge ? (n/totAge*100).toFixed(0) : 0;
      return `<div style="display:grid;grid-template-columns:55px 1fr 50px;align-items:center;gap:.4rem;padding:.2rem 0">
        <div style="font-size:.68rem;font-weight:600;color:var(--ink2)">${b}</div>
        <div style="height:14px;background:var(--fog);border-radius:3px;overflow:hidden">
          <div style="width:${w}%;height:100%;background:${AGE_COLORS[i]};border-radius:3px"></div>
        </div>
        <div style="font-size:.67rem;font-weight:700;color:var(--slate);text-align:right">${n} (${pct}%)</div>
      </div>`;
    }).join('');
  }
}


// ── SELECT REGION ─────────────────────────────────────────────────
function selectRegion(rkey,btn){
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentRegion=rkey;
  currentCountry=null;
  buildCountryList(rkey);
  showRegion(rkey);
}

// ── INIT ──────────────────────────────────────────────────────────
selectRegion('eca',document.querySelector('.rbtn.active'));

// ── THEME TOGGLE ──────────────────────────────────────────────────
function rdToggleTheme(){
  const isDark = document.body.classList.toggle('dark-mode');
  document.getElementById('rd-theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('tf_theme', isDark ? 'dark' : 'light');
}
if(localStorage.getItem('tf_theme')==='dark'){
  document.body.classList.add('dark-mode');
  document.getElementById('rd-theme-btn').textContent='🌙';
}
