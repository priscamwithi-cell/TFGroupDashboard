<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tearfund — Group Workforce Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --teal:#1088A8;--td:#0a6880;--tl:#d0edf4;--tp:#eaf6fa;
  --y:#F8D000;--yd:#d9b800;
  --ink:#0d2b35;--ink2:#1e4a5a;--sl:#4a7a8a;--mi:#8ab5c2;--cl:#cce5ed;--fog:#f0f8fb;
  --ok:#1a8a5a;--dg:#c0392b;--wn:#e67e22;
  --sr:#1088A8;--mid-c:#F8D000;--jr:#E05A1E;
  --r:.4rem;--r2:.8rem;
  --sh:0 2px 10px rgba(16,136,168,.10),0 1px 3px rgba(13,43,53,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--fog);color:var(--ink);font-size:13px}

/* TOPBAR */
.topbar{background:var(--teal);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(16,136,168,.25)}
.logo-badge{background:var(--y);border-radius:5px;padding:3px 10px;flex-shrink:0}
.logo-text{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;color:var(--teal)}
.topbar-center{flex:1;display:flex;align-items:center;gap:.6rem;margin-left:.8rem}
.topbar-title{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;color:#fff}
.topbar-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.tbadge{background:rgba(248,208,0,.2);border:1px solid rgba(248,208,0,.4);color:var(--y);font-size:.65rem;font-weight:700;padding:.15rem .55rem;border-radius:16px}

/* GROUP NAV BAR */
.group-nav{background:var(--td);padding:.55rem 1.5rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;border-bottom:3px solid var(--y);position:sticky;top:58px;z-index:190}
.gnav-label{font-size:.62rem;font-weight:900;color:var(--y);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;margin-right:.2rem}
.gbtn{font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:700;padding:.3rem .85rem;border-radius:18px;cursor:pointer;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);background:rgba(255,255,255,.08);transition:all .15s;white-space:nowrap}
.gbtn:hover{background:rgba(255,255,255,.18);color:#fff}
.gbtn.active{color:#0d2b35;border-color:transparent}

/* MAIN LAYOUT */
.main{padding:1rem 1.5rem 3rem;max-width:1600px;margin:0 auto}

/* SECTION DIVIDER */
.section-hdr{font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--sl);padding:.35rem 0 .35rem;margin-bottom:.65rem;border-bottom:2px solid var(--cl);display:flex;align-items:center;gap:.5rem}
.section-hdr span{flex:1}
.section-hdr .s-count{font-size:.65rem;font-weight:700;color:var(--mi)}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:.5rem;margin-bottom:.9rem}
@media(max-width:1200px){.kpi-strip{grid-template-columns:repeat(4,1fr)}}
.kpi{background:#fff;border-radius:var(--r2);padding:.7rem .65rem .55rem;box-shadow:var(--sh);border:1px solid var(--cl);border-top:3px solid var(--accent,var(--teal))}
.kpi-v{font-family:'Nunito',sans-serif;font-size:1.55rem;font-weight:900;color:var(--td);letter-spacing:-.03em;line-height:1}
.kpi-v sup{font-size:.68rem;vertical-align:top;padding-top:.25rem;display:inline-block}
.kpi-l{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sl);margin-top:.2rem}
.kpi-s{font-size:.58rem;color:var(--mi);margin-top:.05rem}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g31{display:grid;grid-template-columns:3fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g13{display:grid;grid-template-columns:1fr 3fr;gap:.8rem;margin-bottom:.8rem}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:.8rem;margin-bottom:.8rem}
@media(max-width:1100px){.g2,.g3,.g4,.g31,.g13,.g21{grid-template-columns:1fr}}

/* CARD */
.card{background:#fff;border-radius:var(--r2);padding:.9rem;box-shadow:var(--sh);border:1px solid var(--cl)}
.ct{font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:900;color:var(--td);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.08rem}
.cs{font-size:.63rem;color:var(--sl);margin-bottom:.65rem}

/* COUNTRY TABLE */
.ctable{width:100%;border-collapse:collapse;font-size:.7rem}
.ctable th{font-size:.59rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);padding:.32rem .45rem;border-bottom:2px solid var(--tl);text-align:left;background:#fff;position:sticky;top:0;z-index:2}
.ctable td{padding:.28rem .45rem;border-bottom:1px solid var(--fog);vertical-align:middle;color:var(--ink2)}
.ctable tr:hover td{background:var(--tp);cursor:pointer}
.ctable tr.selected td{background:var(--tl)}
.ctable td.nr{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-family:'Nunito',sans-serif}
.scroll-t{overflow-y:auto;max-height:400px;border:1px solid var(--cl);border-radius:var(--r)}
.scroll-t-sm{overflow-y:auto;max-height:280px;border:1px solid var(--cl);border-radius:var(--r)}

/* GROUP PILLS */
.gpill{display:inline-block;font-size:.57rem;font-weight:700;padding:.08rem .38rem;border-radius:7px;margin:.05rem;white-space:nowrap}

/* GRADE PILL */
.grade-pill{display:inline-block;font-size:.58rem;font-weight:700;padding:.07rem .35rem;border-radius:6px;margin:.04rem}
.gp-sr{background:#d0edf4;color:#0a6880}
.gp-mid{background:#fff7cc;color:#7a5800}
.gp-jr{background:#fdeee6;color:#7a2010}
.gp-oth{background:var(--fog);color:var(--sl)}

/* CONTRACT BADGE */
.cb-perm{background:#e8f8f0;color:var(--ok);font-size:.58rem;font-weight:700;padding:.07rem .35rem;border-radius:6px}
.cb-ft{background:#fdeee6;color:var(--dg);font-size:.58rem;font-weight:700;padding:.07rem .35rem;border-radius:6px}

/* TREE */
.tree{padding:.2rem 0}
.tree-group{margin-bottom:.3rem;border:1px solid var(--cl);border-radius:var(--r2);overflow:hidden}
.tree-group-hdr{display:flex;align-items:center;gap:.5rem;padding:.55rem .75rem;cursor:pointer;background:#fff;transition:background .12s;user-select:none}
.tree-group-hdr:hover{background:var(--tp)}
.tree-group-hdr.open{background:var(--tp);border-bottom:1px solid var(--cl)}
.tree-chevron{font-size:.65rem;color:var(--mi);transition:transform .15s;flex-shrink:0}
.tree-chevron.open{transform:rotate(90deg)}
.tree-group-body{display:none;background:var(--fog)}
.tree-group-body.open{display:block}
.tree-team{border-bottom:1px solid var(--cl)}
.tree-team:last-child{border-bottom:none}
.tree-team-hdr{display:flex;align-items:center;gap:.5rem;padding:.42rem .75rem .42rem 1.5rem;cursor:pointer;background:var(--fog);transition:background .12s;user-select:none}
.tree-team-hdr:hover{background:var(--tl)}
.tree-team-hdr.open{background:var(--tl)}
.tree-team-body{display:none;background:#fff}
.tree-team-body.open{display:block}
.tree-subteam{border-bottom:1px solid var(--fog)}
.tree-subteam:last-child{border-bottom:none}
.tree-subteam-hdr{display:flex;align-items:center;gap:.5rem;padding:.38rem .75rem .38rem 2.5rem;cursor:pointer;background:#fff;transition:background .12s;user-select:none}
.tree-subteam-hdr:hover{background:var(--tp)}
.tree-subteam-hdr.open{background:var(--tp)}
.tree-subteam-body{display:none;padding:.5rem .75rem .5rem 3rem}
.tree-subteam-body.open{display:block}
.tree-name{flex:1;font-weight:600;font-size:.73rem;color:var(--ink2)}
.tree-n{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:800;color:var(--td)}
.tree-meta{font-size:.62rem;color:var(--sl);margin-left:.2rem}
.tree-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin:.4rem 0 .2rem}

/* COUNTRY FLAG DOTS */
.country-row{display:flex;align-items:center;gap:.4rem;padding:.22rem .1rem}
.country-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.country-name{font-size:.7rem;font-weight:600;color:var(--ink2);flex:1}
.country-n-badge{font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;color:var(--td)}
.country-bar-wrap{flex:2;height:6px;background:var(--fog);border-radius:3px;overflow:hidden}
.country-bar{height:100%;border-radius:3px}

/* MINI BARS */
.mini-bar-row{display:grid;grid-template-columns:90px 1fr 36px;align-items:center;gap:.4rem;padding:.18rem 0}
.mini-label{font-size:.67rem;color:var(--ink2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-track{height:14px;background:var(--fog);border-radius:3px;overflow:hidden;display:flex}
.mini-fill{height:100%;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:800;color:rgba(255,255,255,.9)}
.mini-val{font-size:.65rem;font-weight:700;text-align:right;font-family:'Nunito',sans-serif;color:var(--sl)}

/* STACKED BAR */
.sbar-row{display:grid;grid-template-columns:110px 1fr 40px;align-items:center;gap:.45rem;padding:.2rem 0}
.sbar-label{font-size:.68rem;font-weight:600;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbar-track{height:16px;background:var(--fog);border-radius:3px;overflow:hidden;display:flex}
.sbar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:800;color:rgba(255,255,255,.95)}
.sbar-total{font-size:.65rem;font-weight:700;text-align:right;font-family:'Nunito',sans-serif;color:var(--sl)}

/* INSIGHT */
.ins{border-radius:var(--r);padding:.5rem .7rem;font-size:.72rem;line-height:1.65;margin-top:.5rem}
.ins-info{background:var(--tp);border-left:3px solid var(--teal);color:var(--td)}
.ins-warn{background:#fff8e8;border-left:3px solid var(--yd);color:#7a5800}
.ins-alert{background:#fdeee6;border-left:3px solid var(--dg);color:#7a2010}
.ins-ok{background:#e8f8f0;border-left:3px solid var(--ok);color:#0a5a2a}

/* SEARCH */
.search-box{padding:.35rem .65rem;border:1.5px solid var(--cl);border-radius:var(--r2);font-size:.75rem;font-family:'Nunito Sans',sans-serif;outline:none;width:100%;margin-bottom:.55rem;transition:border .15s}
.search-box:focus{border-color:var(--teal)}

/* TITLES LIST */
.title-chip{display:inline-block;font-size:.62rem;color:var(--ink2);background:var(--fog);border:1px solid var(--cl);border-radius:5px;padding:.1rem .38rem;margin:.1rem}

/* REGION DOT */
.rdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}

/* PANEL */
.main-panel{display:none}.main-panel.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .18s ease both}
</style>
</head>

const GRADE_ORDER=['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9','Grade 10'];
const TENURE_ORDER=['< 1 yr','1–3 yrs','3–5 yrs','5–10 yrs','10+ yrs'];
const TENURE_COLS=['#c0392b','#e67e22','#d9b800','#1a8a5a','#1088A8'];
const REGION_COL={'United Kingdom':'#1088A8','East & Central Africa':'#E05A1E','West Africa':'#8E44AD','Southern & East Africa':'#27AE60','Asia':'#2980B9','Eurasia & North Africa':'#D35400','Latin America & Caribbean':'#16A085'};
const G_COL={'CEO':'#8E44AD','Core Ops':'#1088A8','GF&C':'#E05A1E','I&P':'#27AE60','P&C':'#E67E22'};

function dc(k){if(charts[k]){charts[k].destroy();delete charts[k];}}
function pct(n,t){return t?Math.round(n/t*1000)/10:0;}
function gcat(g){return ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2'].includes(g)?'Senior':['Grade 3','Grade 4','Grade 5'].includes(g)?'Mid':g.startsWith('Grade')?'Junior':'Other';}
function gpill(g){const c=gcat(g);const [bg,cl]=c==='Senior'?['#d0edf4','#0a6880']:c==='Mid'?['#fff7cc','#7a5800']:c==='Junior'?['#fdeee6','#7a2010']:['var(--fog)','var(--sl)'];return `<span class="grade-pill" style="background:${bg};color:${cl}">${g}</span>`;}
function netCol(v){return v>0?'var(--ok)':v<0?'var(--dg)':'var(--sl)';}
function netStr(v){return v>0?'+'+v:String(v);}

let builtPanels={};
function showPanel(id, btn){
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.gbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='org') { if(!builtPanels.org) buildOrgPanel(); }
  else           { if(!builtPanels[id]) buildGroupPanel(id); }
}

// ── HELPERS ───────────────────────────────────────────────────────
function gradeBar(grade_cts, total, maxN){
  const grades = GRADE_ORDER.filter(g=>grade_cts[g]);
  const maxVal = maxN || Math.max(...grades.map(g=>grade_cts[g]));
  return grades.map(g=>{
    const n=grade_cts[g], w=(n/maxVal*100).toFixed(1);
    const c=gcat(g);
    const col=c==='Senior'?'#1088A8':c==='Mid'?'#d9b800':'#E05A1E';
    return `<div class="mini-bar-row">
      <div class="mini-label">${g}</div>
      <div class="mini-track"><div class="mini-fill" style="width:${w}%;background:${col}">${w>=15?n:''}</div></div>
      <div class="mini-val">${n}</div>
    </div>`;
  }).join('');
}

function tenureBar(tenure){
  const vals=TENURE_ORDER.map(b=>tenure[b]||0);
  const tot=vals.reduce((a,b)=>a+b,0);
  if(!tot) return '<div style="font-size:.65rem;color:var(--mi)">No tenure data</div>';
  return TENURE_ORDER.map((b,i)=>{
    const n=vals[i];if(!n) return '';
    const w=(n/tot*100).toFixed(1);
    return `<div class="mini-bar-row">
      <div class="mini-label">${b}</div>
      <div class="mini-track"><div class="mini-fill" style="width:${w}%;background:${TENURE_COLS[i]}">${w>=12?n:''}</div></div>
      <div class="mini-val">${n}</div>
    </div>`;
  }).join('');
}

function countryList(countries, maxN, showGroups){
  const sorted=Object.entries(countries).sort((a,b)=>b[1]-a[1]);
  const maxV=maxN||Math.max(...sorted.map(x=>x[1]));
  return sorted.map(([c,n])=>{
    const w=(n/maxV*100).toFixed(0);
    return `<div class="country-row">
      <div class="country-dot" style="background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div>
      <div class="country-name">${c}</div>
      <div class="country-bar-wrap"><div class="country-bar" style="width:${w}%;background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div></div>
      <div class="country-n-badge">${n}</div>
    </div>`;
  }).join('');
}

let orgRegionFilter='all';
function filterOrgByRegion(r, btn){
  orgRegionFilter=r;
  document.querySelectorAll('.filter-chip').forEach(b=>{b.style.background='var(--fog)';b.style.color='var(--sl)';b.style.borderColor='var(--cl)';});
  btn.style.background='var(--teal)';btn.style.color='#fff';btn.style.borderColor='var(--teal)';
  const q=document.getElementById('org-country-search').value;
  filterOrgTable(q);
}
function filterOrgTable(q){
  const rows=document.querySelectorAll('#org-country-tbody tr.country-main-row');
  rows.forEach(r=>{
    const region=r.dataset.region;
    const textMatch=!q||r.textContent.toLowerCase().includes(q.toLowerCase());
    const regionMatch=orgRegionFilter==='all'||region===orgRegionFilter;
    r.style.display=(textMatch&&regionMatch)?'':'none';
  });
}

    const empType=Object.entries(c.emp_type).map(([k,v])=>`<span style="font-size:.6rem;color:var(--sl)">${k}:${v}</span>`).join(' ');
    const srCol=c.sr_pct>=28?'color:var(--ok)':c.sr_pct<10?'color:var(--dg)':'';
    const ftCol=c.ft_pct>=80?'color:var(--dg);font-weight:800':c.ft_pct>=60?'color:var(--wn)':'';
    return `<tr class="country-main-row" data-country="${c.country}" data-region="${c.region}" onclick="showOrgCountryDetail('${c.country.replace(/'/g,"\\'")}')">
      <td style="font-weight:700;font-size:.72rem"><span class="rdot" style="background:${REGION_COL[c.region]||'#8ab5c2'}"></span>${c.country}</td>
      <td style="font-size:.67rem;color:var(--sl)">${c.region}</td>
      <td class="nr" style="font-size:.74rem">${c.n}</td>
      <td class="nr" style="${srCol}">${c.sr_pct}%</td>
      <td class="nr">${c.perm_pct}%</td>
      <td class="nr" style="${ftCol}">${c.ft_pct}%</td>
      <td class="nr" style="color:var(--teal)">${c.hires_12m||'—'}</td>
      <td class="nr" style="${c.exits_n>0?'color:var(--dg);font-weight:700':''}">${c.exits_n||'—'}</td>
      <td>${grpPills}</td>
      <td style="font-size:.62rem;color:var(--sl)">${empType}</td>
    </tr>`;
  }).join('');
}

function showOrgCountryDetail(country){
  const c=GD.org_countries.find(x=>x.country===country);
  if(!c) return;
  document.getElementById('ocd-title').textContent=country;
  document.getElementById('ocd-sub').textContent=`${c.region} · ${c.n} staff`;
  const body=document.getElementById('ocd-body');
  const gkeys=['CEO','Core Ops','GF&C','I&P','P&C'];
  const grpRows=gkeys.filter(gk=>c.groups[gk]).map(gk=>`
    <div style="display:flex;align-items:center;gap:.5rem;padding:.22rem 0">
      <span style="width:10px;height:10px;border-radius:50%;background:${G_COL[gk]};flex-shrink:0"></span>
      <span style="flex:1;font-size:.72rem;font-weight:600">${G_FULL[gk]||gk}</span>
      <span style="font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:800;color:var(--td)">${c.groups[gk]}</span>
    </div>`).join('');

  const tenRows=TENURE_ORDER.map((b,i)=>{
    const n=c.tenure[b]||0; if(!n) return '';
    return `<div style="display:flex;align-items:center;gap:.4rem;padding:.15rem 0">
      <span style="width:7px;height:7px;border-radius:50%;background:${TENURE_COLS[i]};flex-shrink:0"></span>
      <span style="flex:1;font-size:.67rem">${b}</span>
      <span style="font-size:.67rem;font-weight:700;color:var(--td)">${n}</span>
    </div>`;
  }).join('');

  const gradeRows=GRADE_ORDER.filter(g=>c.grade_cts[g]).map(g=>{
    const n=c.grade_cts[g];
    return `<div style="display:flex;align-items:center;gap:.4rem;padding:.15rem 0">${gpill(g)}<span style="font-size:.67rem;color:var(--sl)">×${n}</span></div>`;
  }).join('');

  body.innerHTML=`
    <div><div class="ct" style="margin-bottom:.35rem">Group Breakdown</div>${grpRows}</div>
    <div><div class="ct" style="margin-bottom:.35rem">Grade Profile</div>${gradeRows}</div>
    <div>
      <div class="ct" style="margin-bottom:.35rem">Key Metrics</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.3rem">
        ${[['Senior',c.sr_pct+'%'],['Permanent',c.perm_pct+'%'],['Fixed Term',c.ft_pct+'%'],['Hires 12m',c.hires_12m||0],['Exits',c.exits_n||0]].map(([l,v])=>`<div style="background:var(--fog);border-radius:var(--r);padding:.35rem .5rem"><div style="font-size:.62rem;color:var(--sl)">${l}</div><div style="font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:900;color:var(--td)">${v}</div></div>`).join('')}
      </div>
      <div class="ct" style="margin:.5rem 0 .25rem">Tenure</div>${tenRows}
    </div>`;

  const det=document.getElementById('org-country-detail');
  det.style.display='block';
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function buildOrgCharts(){
  Chart.defaults.font.family="'Nunito Sans',sans-serif";
  Chart.defaults.plugins.legend.display=false;
  Chart.defaults.plugins.tooltip.backgroundColor='#0a6880';
  Chart.defaults.plugins.tooltip.cornerRadius=6;
  Chart.defaults.plugins.tooltip.padding=8;

  // Grade chart
  const grades=GRADE_ORDER.filter(g=>ORG.grade_cts[g]);
  const gradeCols=grades.map(g=>gcat(g)==='Senior'?'#1088A8':gcat(g)==='Mid'?'#d9b800':'#E05A1E');
  dc('org-grade');
  charts['org-grade']=new Chart(document.getElementById('org-grade-chart'),{
    type:'bar',
    data:{labels:grades,datasets:[{data:grades.map(g=>ORG.grade_cts[g]),backgroundColor:gradeCols,borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:18}},
      scales:{y:{display:false,grid:{display:false}},x:{grid:{display:false},border:{display:false},ticks:{font:{size:9}}}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} staff`}},
        datalabels:{anchor:'end',align:'top',color:'var(--ink2)',font:{weight:'bold',size:9},formatter:v=>v>0?v:''}}}
  });

  // Contract by group
  const gkeys=['CEO','Core Ops','GF&C','I&P','P&C'];
  dc('org-contract');
  charts['org-contract']=new Chart(document.getElementById('org-contract-chart'),{
    type:'bar',
    data:{labels:gkeys,datasets:[
      {label:'Permanent',data:gkeys.map(gk=>GD.groups[gk].perm_n),backgroundColor:'#1a8a5a',borderRadius:3},
      {label:'Fixed Term',data:gkeys.map(gk=>GD.groups[gk].ft_n),backgroundColor:'#c0392b',borderRadius:3},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{stacked:true,grid:{display:false},border:{display:false}},y:{stacked:true,display:false,grid:{display:false}}},
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:9,padding:6}},
        tooltip:{mode:'index',intersect:false},
        datalabels:{color:'#fff',font:{weight:'bold',size:9},formatter:v=>v>5?v:'',display:ctx=>ctx.dataset.data[ctx.dataIndex]>5}}}
  });

  // Tenure
  const tenVals=TENURE_ORDER.map(b=>ORG.tenure[b]||0);
  dc('org-tenure');
  charts['org-tenure']=new Chart(document.getElementById('org-tenure-chart'),{
    type:'doughnut',
    data:{labels:TENURE_ORDER,datasets:[{data:tenVals,backgroundColor:TENURE_COLS,borderWidth:3,borderColor:'#fff'}]},
    options:{cutout:'60%',animation:{duration:400},
      plugins:{legend:{display:true,position:'right',labels:{font:{size:9},boxWidth:9,padding:5}},
        tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} staff (${pct(c.raw,ORG.n)}%)`}},
        datalabels:{color:'#fff',font:{weight:'bold',size:9},formatter:v=>v>15?v:''}}}
  });
}

// ════════════════════════════════════════════════════════════════
// GROUP PANEL
// ════════════════════════════════════════════════════════════════
function buildGroupPanel(gk){
  builtPanels[gk]=true;
  const g=GD.groups[gk];
  const col=g.color;

  // KPI strip
  let html=`
  <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.75rem">
    <div style="width:4px;height:28px;border-radius:2px;background:${col}"></div>
    <div>
      <div style="font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:900;color:${col}">${g.full_name}</div>
      <div style="font-size:.67rem;color:var(--sl)">${g.n} staff · ${Object.keys(g.countries).length} countries · ${Object.keys(g.teams).length} teams</div>
    </div>
  </div>
  <div class="kpi-strip">
    <div class="kpi" style="--accent:${col}"><div class="kpi-v">${g.n}</div><div class="kpi-l">Total Staff</div><div class="kpi-s">${pct(g.n,ORG.n)}% of org</div></div>
    <div class="kpi" style="--accent:#1088A8"><div class="kpi-v">${g.sr_pct}<sup>%</sup></div><div class="kpi-l">Senior</div><div class="kpi-s">${g.senior_n} staff</div></div>
    <div class="kpi" style="--accent:#1a8a5a"><div class="kpi-v">${g.perm_pct}<sup>%</sup></div><div class="kpi-l">Permanent</div><div class="kpi-s">${g.perm_n} staff</div></div>
    <div class="kpi" style="--accent:#c0392b"><div class="kpi-v">${g.ft_pct}<sup>%</sup></div><div class="kpi-l">Fixed Term</div><div class="kpi-s">${g.ft_n} staff</div></div>
    <div class="kpi" style="--accent:var(--teal)"><div class="kpi-v">${g.hire_12m}</div><div class="kpi-l">Hires 12m</div><div class="kpi-s">${g.hire_rate}% rate</div></div>
    <div class="kpi" style="--accent:${g.exits_n?'#c0392b':'#1a8a5a'}"><div class="kpi-v">${g.exits_n}</div><div class="kpi-l">Exits</div><div class="kpi-s">${g.exit_rate}% Q4 2025</div></div>
    <div class="kpi" style="--accent:${netCol(g.net_flow)}"><div class="kpi-v" style="color:${netCol(g.net_flow)}">${netStr(g.net_flow)}</div><div class="kpi-l">Net Flow</div><div class="kpi-s">Hires minus exits</div></div>
    <div class="kpi" style="--accent:#8E44AD"><div class="kpi-v">${g.mob_up}</div><div class="kpi-l">Promotions</div><div class="kpi-s">${g.mob_dn} downgraded</div></div>
  </div>

  <!-- TOP ROW: Grade + Tenure + Countries -->
  <div class="g3">
    <div class="card">
      <div class="ct">Grade Distribution</div><div class="cs">Senior · Mid · Junior breakdown</div>
      <div style="height:160px"><canvas id="${gk}-grade-chart"></canvas></div>
      <div style="margin-top:.4rem;display:flex;gap:.5rem;flex-wrap:wrap">
        ${[['Senior',g.senior_n,'#1088A8'],['Mid',g.mid_n,'#d9b800'],['Junior',g.junior_n,'#E05A1E']].map(([l,n,c])=>`<span style="font-size:.65rem"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:2px;vertical-align:middle"></span>${l}: ${n} (${pct(n,g.n)}%)</span>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="ct">Tenure Distribution</div><div class="cs">Length of service</div>
      ${tenureBar(g.tenure)}
    </div>
    <div class="card">
      <div class="ct">Employee & Contract Type</div><div class="cs">How staff are engaged</div>
      <div style="margin-bottom:.5rem">
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sl);margin-bottom:.3rem">Contract</div>
        ${[['Permanent',g.perm_n,'#1a8a5a'],['Fixed Term',g.ft_n,'#c0392b']].map(([l,n,c])=>{
          const w=pct(n,g.n);
          return `<div class="mini-bar-row"><div class="mini-label">${l}</div><div class="mini-track"><div class="mini-fill" style="width:${w}%;background:${c}">${w>=12?n:''}</div></div><div class="mini-val">${n}</div></div>`;
        }).join('')}
      </div>
      <div>
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sl);margin-bottom:.3rem">Employee Type</div>
        ${Object.entries(g.emp_types).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
          const w=pct(v,g.n);
          return `<div class="mini-bar-row"><div class="mini-label">${k}</div><div class="mini-track"><div class="mini-fill" style="width:${w}%;background:var(--teal)">${w>=12?v:''}</div></div><div class="mini-val">${v}</div></div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <!-- COUNTRY PRESENCE + REGION -->
  <div class="g21">
    <div class="card">
      <div class="ct">Staff Location by Country</div>
      <div class="cs">All ${Object.keys(g.countries).length} countries where ${gk} staff are based</div>
      <input class="search-box" id="${gk}-country-search" placeholder="Search country…" oninput="filterCountryList('${gk}',this.value)">
      <div id="${gk}-country-list">${countryList(g.countries, null, true)}</div>
    </div>
    <div class="card">
      <div class="ct">Regions</div><div class="cs">Staff count by region</div>
      <div style="height:180px"><canvas id="${gk}-region-chart"></canvas></div>
    </div>
  </div>

  <!-- TEAM & SUBTEAM DRILL-DOWN -->
  <div class="section-hdr"><span>Team & Subteam Structure</span><span class="s-count">click to expand · shows staff count, grade mix & country breakdown</span></div>
  <div class="tree" id="${gk}-tree">`;

  // Build tree
  Object.entries(g.teams).forEach(([tname, team])=>{
    const tid=`${gk}-t-${tname.replace(/[^a-z0-9]/gi,'_')}`;
    const srBadge=`<span style="font-size:.6rem;padding:.06rem .35rem;border-radius:6px;background:#d0edf4;color:#0a6880;font-weight:700;margin-left:.3rem">${team.sr_pct}% Sr</span>`;
    const permBadge=`<span style="font-size:.6rem;padding:.06rem .35rem;border-radius:6px;background:${team.perm_pct>60?'#e8f8f0':'#fdeee6'};color:${team.perm_pct>60?'var(--ok)':'var(--dg)'};font-weight:700;margin-left:.2rem">${team.perm_pct}% Perm</span>`;
    const cPills=Object.entries(team.countries).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,n])=>`<span style="font-size:.59rem;padding:.05rem .32rem;border-radius:5px;background:${REGION_COL[getRegion(c)]||'#8ab5c2'}22;color:${REGION_COL[getRegion(c)]||'#1088A8'};border:1px solid ${REGION_COL[getRegion(c)]||'#8ab5c2'}44;font-weight:600">${c} ${n}</span>`).join('');

    html+=`<div class="tree-group">
      <div class="tree-group-hdr" onclick="toggleTree('${tid}')">
        <span class="tree-chevron" id="${tid}-chv">▶</span>
        <span class="tree-name">${tname}</span>
        <span class="tree-n">${team.n}</span>
        ${srBadge}${permBadge}
        <span style="margin-left:.4rem;display:flex;gap:.2rem;flex-wrap:wrap">${cPills}</span>
      </div>
      <div class="tree-group-body" id="${tid}">`;

    Object.entries(team.subteams).forEach(([stname, st])=>{
      const stid=`${tid}_${stname.replace(/[^a-z0-9]/gi,'_')}`;
      const stSrBadge=`<span style="font-size:.58rem;padding:.05rem .3rem;border-radius:5px;background:#d0edf4;color:#0a6880;font-weight:700">${st.sr_pct}%Sr</span>`;
      const stPermBadge=`<span style="font-size:.58rem;padding:.05rem .3rem;border-radius:5px;background:${st.perm_pct>60?'#e8f8f0':'#fdeee6'};color:${st.perm_pct>60?'var(--ok)':'var(--dg)'};font-weight:700">${st.perm_pct}%Perm</span>`;

      html+=`<div class="tree-team">
        <div class="tree-team-hdr" onclick="toggleTree('${stid}')">
          <span class="tree-chevron" id="${stid}-chv" style="font-size:.58rem">▶</span>
          <span class="tree-name" style="font-size:.71rem">${stname}</span>
          <span class="tree-n" style="font-size:.7rem">${st.n}</span>
          ${stSrBadge} ${stPermBadge}
        </div>
        <div class="tree-team-body" id="${stid}">
          <div style="padding:.55rem .75rem .55rem 2.5rem">
            <div class="g3">
              <div>
                <div class="tree-label">Grades</div>
                ${Object.entries(st.grade_cts).map(([g2,n])=>`${gpill(g2)}<span style="font-size:.62rem;color:var(--sl)">×${n}</span> `).join('')}
              </div>
              <div>
                <div class="tree-label">Contract</div>
                <span class="cb-perm">Perm: ${st.perm_n}</span>
                <span class="cb-ft" style="margin-left:.3rem">FT: ${st.ft_n}</span>
                <div class="tree-label" style="margin-top:.4rem">Hires / Exits (Q4 2025)</div>
                <span style="font-size:.67rem;color:var(--teal);font-weight:700">↑ ${st.hires_12m} hires</span>
                <span style="font-size:.67rem;color:${st.exits_n?'var(--dg)':'var(--sl)'};font-weight:700;margin-left:.5rem">${st.exits_n?'↓ '+st.exits_n+' exits':'0 exits'}</span>
              </div>
              <div>
                <div class="tree-label">Countries (${Object.keys(st.countries).length})</div>
                ${Object.entries(st.countries).sort((a,b)=>b[1].n-a[1].n).map(([country, cd])=>{
                  const empStr=Object.entries(cd.emp_type).map(([k,v])=>`${k}:${v}`).join(', ');
                  return `<div style="margin-bottom:.3rem;padding:.3rem .4rem;background:var(--fog);border-radius:var(--r);border:1px solid var(--cl)">
                    <div style="display:flex;align-items:center;gap:.35rem;margin-bottom:.15rem">
                      <span class="country-dot" style="background:${REGION_COL[getRegion(country)]||'#8ab5c2'}"></span>
                      <span style="font-weight:700;font-size:.7rem">${country}</span>
                      <span style="font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;color:var(--td);margin-left:auto">${cd.n}</span>
                    </div>
                    <div style="display:flex;gap:.2rem;flex-wrap:wrap;margin-bottom:.1rem">${Object.entries(cd.grades).map(([g2,n])=>`${gpill(g2)}×${n}`).join(' ')}</div>
                    <div style="font-size:.6rem;color:var(--sl)">${empStr} · Perm:${cd.perm_n} FT:${cd.ft_n}</div>
                    ${cd.titles.length?`<div style="margin-top:.2rem">${cd.titles.slice(0,6).map(t=>`<span class="title-chip">${t}</span>`).join('')}${cd.titles.length>6?`<span class="title-chip" style="color:var(--mi)">+${cd.titles.length-6} more</span>`:''}</div>`:''}
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>`;
    });

    html+=`</div></div>`;
  });

  html+=`</div>`; // tree

  document.getElementById('panel-'+gk).innerHTML=html;

  // Build charts
  setTimeout(()=>buildGroupCharts(gk, g), 0);
}

function filterCountryList(gk, q){
  const el=document.getElementById(gk+'-country-list');
  const countries=GD.groups[gk].countries;
  const sorted=Object.entries(countries).sort((a,b)=>b[1]-a[1]);
  const filtered=q?sorted.filter(([c])=>c.toLowerCase().includes(q.toLowerCase())):sorted;
  const maxV=Math.max(...sorted.map(x=>x[1]));
  el.innerHTML=filtered.map(([c,n])=>{
    const w=(n/maxV*100).toFixed(0);
    return `<div class="country-row">
      <div class="country-dot" style="background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div>
      <div class="country-name">${c}</div>
      <div class="country-bar-wrap"><div class="country-bar" style="width:${w}%;background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div></div>
      <div class="country-n-badge">${n}</div>
    </div>`;
  }).join('');
}

function buildGroupCharts(gk, g){
  Chart.defaults.font.family="'Nunito Sans',sans-serif";
  Chart.defaults.plugins.legend.display=false;
  Chart.defaults.plugins.tooltip.backgroundColor='#0a6880';

  // Grade chart
  const grades=GRADE_ORDER.filter(gr=>g.grade_cts[gr]);
  const gradeCols=grades.map(gr=>gcat(gr)==='Senior'?g.color:gcat(gr)==='Mid'?'#d9b800':'#E05A1E');
  dc(gk+'-grade');
  charts[gk+'-grade']=new Chart(document.getElementById(gk+'-grade-chart'),{
    type:'bar',
    data:{labels:grades,datasets:[{data:grades.map(gr=>g.grade_cts[gr]),backgroundColor:gradeCols,borderRadius:3,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:16}},
      scales:{y:{display:false,grid:{display:false}},x:{grid:{display:false},border:{display:false},ticks:{font:{size:9}}}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw}`}},
        datalabels:{anchor:'end',align:'top',color:'var(--ink2)',font:{weight:'bold',size:9},formatter:v=>v>0?v:''}}}
  });

  // Region chart
  const regEntries=Object.entries(g.regions).sort((a,b)=>b[1]-a[1]);
  dc(gk+'-region');
  charts[gk+'-region']=new Chart(document.getElementById(gk+'-region-chart'),{
    type:'doughnut',
    data:{labels:regEntries.map(x=>x[0]),datasets:[{data:regEntries.map(x=>x[1]),backgroundColor:regEntries.map(x=>REGION_COL[x[0]]||'#8ab5c2'),borderWidth:3,borderColor:'#fff'}]},
    options:{cutout:'62%',animation:{duration:400},
      plugins:{legend:{display:true,position:'right',labels:{font:{size:9},boxWidth:9,padding:5}},
        tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} staff`}},
        datalabels:{color:'#fff',font:{weight:'bold',size:9},formatter:v=>v>5?v:''}}}
  });
}

// ── TREE TOGGLE ───────────────────────────────────────────────────
function toggleTree(id){
  const body=document.getElementById(id);
  const chv=document.getElementById(id+'-chv');
  if(!body) return;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if(chv){ chv.textContent=isOpen?'▶':'▼'; chv.classList.toggle('open',!isOpen); }
  // Also toggle header styling
  const hdr=body.previousElementSibling;
  if(hdr) hdr.classList.toggle('open',!isOpen);
}

// ── INIT ──────────────────────────────────────────────────────────
buildOrgPanel();
