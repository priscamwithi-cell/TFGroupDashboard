<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tearfund — Group Workforce Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp, deleteDoc, doc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAzdJrtQshBDsNzRH3YqtBSMm0g45W0RMU",
  authDomain: "tf-talent-hub.firebaseapp.com",
  databaseURL: "https://tf-talent-hub-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tf-talent-hub",
  storageBucket: "tf-talent-hub.firebasestorage.app",
  messagingSenderId: "422929352376",
  appId: "1:422929352376:web:d550d34a70364bf7d9564d"
};

  const PAGE_ID   = "group_dashboard";
  const app       = initializeApp(firebaseConfig);
  const auth      = getAuth(app);
  const db        = getFirestore(app);
  let currentUser = null;
  let selectedText = "";

  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    currentUser = user;
    document.getElementById("gd-user-email").textContent = user.email;
    if (user.photoURL) {
      const av = document.getElementById("gd-user-avatar");
      av.src = user.photoURL; av.style.display = "block";
    }
    loadComments();
  });

  document.addEventListener('mouseup', () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 3) return;
    selectedText = sel.toString().trim().slice(0, 300);
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    const prompt = document.getElementById('gd-comment-prompt');
    prompt.style.top  = (rect.bottom + window.scrollY + 8) + 'px';
    prompt.style.left = Math.min(rect.left, window.innerWidth - 260) + 'px';
    prompt.style.display = 'block';
    document.getElementById('gd-prompt-preview').textContent = '"' + selectedText.slice(0,80) + (selectedText.length>80?'…':'') + '"';
  });
  window.addEventListener('scroll', () => { document.getElementById('gd-comment-prompt').style.display = 'none'; });

  window.gdDismissPrompt = () => { document.getElementById('gd-comment-prompt').style.display = 'none'; selectedText = ''; };

  window.gdOpenCommentPanel = () => {
    document.getElementById('gd-comment-prompt').style.display = 'none';
    document.getElementById('gd-comment-panel').classList.add('open');
    document.getElementById('gd-comment-quote').textContent = selectedText.slice(0,150) + (selectedText.length>150?'…':'');
    document.getElementById('gd-comment-input').focus();
  };

  window.gdCloseCommentPanel = () => {
    document.getElementById('gd-comment-panel').classList.remove('open');
    document.getElementById('gd-comment-input').value = '';
    selectedText = '';
  };

  window.gdSubmitComment = async () => {
    const text = document.getElementById('gd-comment-input').value.trim();
    if (!text || !currentUser) return;
    const btn = document.getElementById('gd-submit-btn');
    btn.disabled = true; btn.textContent = 'Posting…';
    try {
      await addDoc(collection(db, 'comments'), {
        page: PAGE_ID, quote: selectedText, comment: text,
        author: currentUser.email,
        authorName: currentUser.displayName || currentUser.email.split('@')[0],
        timestamp: serverTimestamp()
      });
      gdCloseCommentPanel(); loadComments();
    } catch(e) { alert('Failed: ' + e.message); }
    finally { btn.disabled = false; btn.textContent = 'Post Comment'; }
  };

  window.loadComments = async () => {
    const list = document.getElementById('gd-comments-list');
    list.innerHTML = '<div style="padding:1rem;font-size:.82rem;color:#4a7a8a;">Loading…</div>';
    try {
      const q = query(collection(db,'comments'), where('page','==',PAGE_ID), orderBy('timestamp','desc'));
      const snap = await getDocs(q);
      document.getElementById('gd-comment-count').textContent = snap.size || '0';
      if (snap.empty) { list.innerHTML = '<div style="padding:1.5rem 1rem;font-size:.82rem;color:#4a7a8a;text-align:center;">No comments yet. Select any text to add one.</div>'; return; }
      list.innerHTML = '';
      snap.forEach(docSnap => {
        const d = docSnap.data();
        const ts = d.timestamp?.toDate ? d.timestamp.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : 'Just now';
        const div = document.createElement('div');
        div.className = 'gd-comment-item';
        div.innerHTML = `<div class="gd-comment-quote">"${(d.quote||'').slice(0,100)}${(d.quote||'').length>100?'…':''}"</div>
          <div class="gd-comment-text">${d.comment}</div>
          <div class="gd-comment-meta"><span class="gd-comment-author">${d.authorName}</span><span class="gd-comment-time">${ts}</span>
          ${(currentUser && currentUser.email === d.author) ? `<button class="gd-comment-delete" onclick="gdDeleteComment('${docSnap.id}')">✕</button>` : ''}</div>`;
        list.appendChild(div);
      });
    } catch(e) { list.innerHTML = '<div style="padding:1rem;font-size:.82rem;color:#c0392b;">Could not load comments.</div>'; }
  };

  window.gdDeleteComment = async (id) => {
    if (!confirm('Delete this comment?')) return;
    try { await deleteDoc(doc(db,'comments',id)); loadComments(); } catch(e) { alert('Delete failed.'); }
  };

  window.gdToggleComments = () => {
    const s = document.getElementById('gd-comments-sidebar');
    s.classList.toggle('open');
    if (s.classList.contains('open')) loadComments();
  };
</script>
<style>
:root{
  --teal:#1088A8;--td:#0a6880;--tl:#d0edf4;--tp:#eaf6fa;
  --y:#F8D000;--yd:#d9b800;
  --ink:#0d2b35;--ink2:#1e4a5a;--sl:#4a7a8a;--mi:#8ab5c2;--cl:#cce5ed;--fog:#f0f8fb;
  --ok:#1a8a5a;--dg:#c0392b;--wn:#e67e22;
  --sr:#1088A8;--mid-c:#F8D000;--jr:#E05A1E;
  --r:.4rem;--r2:.8rem;
  --sh:0 2px 10px rgba(16,136,168,.10),0 1px 3px rgba(13,43,53,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--fog);color:var(--ink);font-size:13px}

/* TOPBAR */
.topbar{background:var(--teal);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(16,136,168,.25)}

/* Dark mode */
body.dark-mode{--fog:#0f1f24;--wh:#162830;--cl:#1e4a5a;--tp:#0d2b35;--tl:#0f2d38;--ink:#e0eff3;--ink2:#b0cdd5;--sl:#6aacbc}

/* Theme toggle */
.gd-theme-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:.3rem .6rem;font-size:.85rem;cursor:pointer;line-height:1;transition:background .2s}
.gd-theme-btn:hover{background:rgba(255,255,255,.2)}

/* Hub back btn */
.hub-back-btn{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:.28rem .85rem;border-radius:20px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;text-decoration:none;transition:background .2s}
.hub-back-btn:hover{background:rgba(255,255,255,.22)}

/* Comments btn */
.gd-comments-btn{display:flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:.28rem .85rem;border-radius:20px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:background .2s}
.gd-comments-btn:hover{background:rgba(255,255,255,.2)}
.gd-badge{background:var(--y);color:var(--td);font-size:.63rem;font-weight:800;padding:1px 6px;border-radius:10px}

/* Comment prompt */
.gd-prompt{display:none;position:absolute;z-index:500;background:#fff;border:1px solid #cce5ed;border-radius:10px;padding:.8rem 1rem;box-shadow:0 8px 24px rgba(16,136,168,.18);max-width:250px}
.gd-prompt span{font-size:.75rem;color:#4a7a8a;font-style:italic;margin-bottom:.6rem;display:block}
.gd-prompt-btns{display:flex;gap:.5rem}
.gd-pbtn{font-size:.75rem;font-weight:700;font-family:'Nunito Sans',sans-serif;border:none;border-radius:6px;padding:.35rem .75rem;cursor:pointer}
.gd-pbtn-c{background:#1088A8;color:#fff}
.gd-pbtn-d{background:#f0f8fb;color:#4a7a8a}

/* Comment panel */
.gd-panel{position:fixed;top:0;right:-380px;width:360px;height:100vh;background:#fff;border-left:1px solid #cce5ed;box-shadow:-4px 0 24px rgba(16,136,168,.12);z-index:400;display:flex;flex-direction:column;transition:right .3s ease}
.gd-panel.open{right:0}
.gd-panel-hdr{background:#1088A8;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between}
.gd-panel-hdr h3{font-family:'Nunito',sans-serif;color:#fff;font-size:.9rem;margin:0}
.gd-panel-x{background:none;border:none;color:rgba(255,255,255,.7);font-size:1.2rem;cursor:pointer}
.gd-panel-x:hover{color:#fff}
.gd-panel-body{flex:1;overflow-y:auto;padding:1.2rem}
.gd-cquote{background:#eaf6fa;border-left:3px solid #1088A8;padding:.6rem .8rem;border-radius:0 6px 6px 0;font-size:.78rem;color:#4a7a8a;font-style:italic;margin-bottom:1rem}
#gd-comment-input{width:100%;border:1px solid #cce5ed;border-radius:8px;padding:.75rem;font-family:'Nunito Sans',sans-serif;font-size:.85rem;resize:vertical;min-height:100px;background:#f0f8fb}
#gd-comment-input:focus{outline:none;border-color:#1088A8}
#gd-submit-btn{width:100%;margin-top:.75rem;background:#1088A8;color:#fff;border:none;border-radius:8px;padding:.7rem;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer}
#gd-submit-btn:hover{background:#0a6880}
#gd-submit-btn:disabled{opacity:.6;cursor:not-allowed}
.gd-comment-item{background:#f0f8fb;border:1px solid #cce5ed;border-radius:8px;padding:.9rem;margin-bottom:.75rem}
.gd-comment-quote{font-size:.75rem;color:#4a7a8a;font-style:italic;border-left:3px solid #d0edf4;padding-left:.6rem;margin-bottom:.5rem}
.gd-comment-text{font-size:.85rem;color:#0d2b35;margin-bottom:.5rem;line-height:1.5}
.gd-comment-meta{display:flex;align-items:center;gap:.75rem;font-size:.72rem}
.gd-comment-author{font-weight:700;color:#0a6880}
.gd-comment-time{color:#4a7a8a}
.gd-comment-delete{margin-left:auto;background:none;border:none;color:#c0392b;cursor:pointer;font-size:.75rem;opacity:.6}
.gd-comment-delete:hover{opacity:1}
.logo-badge{background:var(--y);border-radius:5px;padding:3px 10px;flex-shrink:0}
.logo-text{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;color:var(--teal)}
.topbar-center{flex:1;display:flex;align-items:center;gap:.6rem;margin-left:.8rem}
.topbar-title{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;color:#fff}
.topbar-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.tbadge{background:rgba(248,208,0,.2);border:1px solid rgba(248,208,0,.4);color:var(--y);font-size:.65rem;font-weight:700;padding:.15rem .55rem;border-radius:16px}

/* GROUP NAV BAR */
.group-nav{background:var(--td);padding:.55rem 1.5rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;border-bottom:3px solid var(--y);position:sticky;top:58px;z-index:190}
.gnav-label{font-size:.62rem;font-weight:900;color:var(--y);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;margin-right:.2rem}
.gbtn{font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:700;padding:.3rem .85rem;border-radius:18px;cursor:pointer;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);background:rgba(255,255,255,.08);transition:all .15s;white-space:nowrap}
.gbtn:hover{background:rgba(255,255,255,.18);color:#fff}
.gbtn.active{color:#0d2b35;border-color:transparent}

/* MAIN LAYOUT */
.main{padding:1rem 1.5rem 3rem;max-width:1600px;margin:0 auto}

/* SECTION DIVIDER */
.section-hdr{font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--sl);padding:.35rem 0 .35rem;margin-bottom:.65rem;border-bottom:2px solid var(--cl);display:flex;align-items:center;gap:.5rem}
.section-hdr span{flex:1}
.section-hdr .s-count{font-size:.65rem;font-weight:700;color:var(--mi)}

/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:.5rem;margin-bottom:.9rem}
@media(max-width:1200px){.kpi-strip{grid-template-columns:repeat(4,1fr)}}
.kpi{background:#fff;border-radius:var(--r2);padding:.7rem .65rem .55rem;box-shadow:var(--sh);border:1px solid var(--cl);border-top:3px solid var(--accent,var(--teal))}
.kpi-v{font-family:'Nunito',sans-serif;font-size:1.55rem;font-weight:900;color:var(--td);letter-spacing:-.03em;line-height:1}
.kpi-v sup{font-size:.68rem;vertical-align:top;padding-top:.25rem;display:inline-block}
.kpi-l{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sl);margin-top:.2rem}
.kpi-s{font-size:.58rem;color:var(--mi);margin-top:.05rem}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g31{display:grid;grid-template-columns:3fr 1fr;gap:.8rem;margin-bottom:.8rem}
.g13{display:grid;grid-template-columns:1fr 3fr;gap:.8rem;margin-bottom:.8rem}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:.8rem;margin-bottom:.8rem}
@media(max-width:1100px){.g2,.g3,.g4,.g31,.g13,.g21{grid-template-columns:1fr}}

/* CARD */
.card{background:#fff;border-radius:var(--r2);padding:.9rem;box-shadow:var(--sh);border:1px solid var(--cl)}
.ct{font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:900;color:var(--td);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.08rem}
.cs{font-size:.63rem;color:var(--sl);margin-bottom:.65rem}

/* COUNTRY TABLE */
.ctable{width:100%;border-collapse:collapse;font-size:.7rem}
.ctable th{font-size:.59rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);padding:.32rem .45rem;border-bottom:2px solid var(--tl);text-align:left;background:#fff;position:sticky;top:0;z-index:2}
.ctable td{padding:.28rem .45rem;border-bottom:1px solid var(--fog);vertical-align:middle;color:var(--ink2)}
.ctable tr:hover td{background:var(--tp);cursor:pointer}
.ctable tr.selected td{background:var(--tl)}
.ctable td.nr{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-family:'Nunito',sans-serif}
.scroll-t{overflow-y:auto;max-height:400px;border:1px solid var(--cl);border-radius:var(--r)}
.scroll-t-sm{overflow-y:auto;max-height:280px;border:1px solid var(--cl);border-radius:var(--r)}

/* GROUP PILLS */
.gpill{display:inline-block;font-size:.57rem;font-weight:700;padding:.08rem .38rem;border-radius:7px;margin:.05rem;white-space:nowrap}

/* GRADE PILL */
.grade-pill{display:inline-block;font-size:.58rem;font-weight:700;padding:.07rem .35rem;border-radius:6px;margin:.04rem}
.gp-sr{background:#d0edf4;color:#0a6880}
.gp-mid{background:#fff7cc;color:#7a5800}
.gp-jr{background:#fdeee6;color:#7a2010}
.gp-oth{background:var(--fog);color:var(--sl)}

/* CONTRACT BADGE */
.cb-perm{background:#e8f8f0;color:var(--ok);font-size:.58rem;font-weight:700;padding:.07rem .35rem;border-radius:6px}
.cb-ft{background:#fdeee6;color:var(--dg);font-size:.58rem;font-weight:700;padding:.07rem .35rem;border-radius:6px}

/* TREE */
.tree{padding:.2rem 0}
.tree-group{margin-bottom:.3rem;border:1px solid var(--cl);border-radius:var(--r2);overflow:hidden}
.tree-group-hdr{display:flex;align-items:center;gap:.5rem;padding:.55rem .75rem;cursor:pointer;background:#fff;transition:background .12s;user-select:none}
.tree-group-hdr:hover{background:var(--tp)}
.tree-group-hdr.open{background:var(--tp);border-bottom:1px solid var(--cl)}
.tree-chevron{font-size:.65rem;color:var(--mi);transition:transform .15s;flex-shrink:0}
.tree-chevron.open{transform:rotate(90deg)}
.tree-group-body{display:none;background:var(--fog)}
.tree-group-body.open{display:block}
.tree-team{border-bottom:1px solid var(--cl)}
.tree-team:last-child{border-bottom:none}
.tree-team-hdr{display:flex;align-items:center;gap:.5rem;padding:.42rem .75rem .42rem 1.5rem;cursor:pointer;background:var(--fog);transition:background .12s;user-select:none}
.tree-team-hdr:hover{background:var(--tl)}
.tree-team-hdr.open{background:var(--tl)}
.tree-team-body{display:none;background:#fff}
.tree-team-body.open{display:block}
.tree-subteam{border-bottom:1px solid var(--fog)}
.tree-subteam:last-child{border-bottom:none}
.tree-subteam-hdr{display:flex;align-items:center;gap:.5rem;padding:.38rem .75rem .38rem 2.5rem;cursor:pointer;background:#fff;transition:background .12s;user-select:none}
.tree-subteam-hdr:hover{background:var(--tp)}
.tree-subteam-hdr.open{background:var(--tp)}
.tree-subteam-body{display:none;padding:.5rem .75rem .5rem 3rem}
.tree-subteam-body.open{display:block}
.tree-name{flex:1;font-weight:600;font-size:.73rem;color:var(--ink2)}
.tree-n{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:800;color:var(--td)}
.tree-meta{font-size:.62rem;color:var(--sl);margin-left:.2rem}
.tree-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin:.4rem 0 .2rem}

/* COUNTRY FLAG DOTS */
.country-row{display:flex;align-items:center;gap:.4rem;padding:.22rem .1rem}
.country-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.country-name{font-size:.7rem;font-weight:600;color:var(--ink2);flex:1}
.country-n-badge{font-family:'Nunito',sans-serif;font-size:.68rem;font-weight:800;color:var(--td)}
.country-bar-wrap{flex:2;height:6px;background:var(--fog);border-radius:3px;overflow:hidden}
.country-bar{height:100%;border-radius:3px}

/* MINI BARS */
.mini-bar-row{display:grid;grid-template-columns:90px 1fr 36px;align-items:center;gap:.4rem;padding:.18rem 0}
.mini-label{font-size:.67rem;color:var(--ink2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-track{height:14px;background:var(--fog);border-radius:3px;overflow:hidden;display:flex}
.mini-fill{height:100%;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:800;color:rgba(255,255,255,.9)}
.mini-val{font-size:.65rem;font-weight:700;text-align:right;font-family:'Nunito',sans-serif;color:var(--sl)}

/* STACKED BAR */
.sbar-row{display:grid;grid-template-columns:110px 1fr 40px;align-items:center;gap:.45rem;padding:.2rem 0}
.sbar-label{font-size:.68rem;font-weight:600;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbar-track{height:16px;background:var(--fog);border-radius:3px;overflow:hidden;display:flex}
.sbar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:800;color:rgba(255,255,255,.95)}
.sbar-total{font-size:.65rem;font-weight:700;text-align:right;font-family:'Nunito',sans-serif;color:var(--sl)}

/* INSIGHT */
.ins{border-radius:var(--r);padding:.5rem .7rem;font-size:.72rem;line-height:1.65;margin-top:.5rem}
.ins-info{background:var(--tp);border-left:3px solid var(--teal);color:var(--td)}
.ins-warn{background:#fff8e8;border-left:3px solid var(--yd);color:#7a5800}
.ins-alert{background:#fdeee6;border-left:3px solid var(--dg);color:#7a2010}
.ins-ok{background:#e8f8f0;border-left:3px solid var(--ok);color:#0a5a2a}

/* SEARCH */
.search-box{padding:.35rem .65rem;border:1.5px solid var(--cl);border-radius:var(--r2);font-size:.75rem;font-family:'Nunito Sans',sans-serif;outline:none;width:100%;margin-bottom:.55rem;transition:border .15s}
.search-box:focus{border-color:var(--teal)}

/* TITLES LIST */
.title-chip{display:inline-block;font-size:.62rem;color:var(--ink2);background:var(--fog);border:1px solid var(--cl);border-radius:5px;padding:.1rem .38rem;margin:.1rem}

/* REGION DOT */
.rdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle}

/* PANEL */
.main-panel{display:none}.main-panel.active{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .18s ease both}

/* ── GROUP DEMO TABS ── */
.demo-tabs{display:flex;gap:.4rem;margin:.9rem 0 .5rem;border-bottom:2px solid var(--cl)}

const GRADE_ORDER=['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9','Grade 10'];
const TENURE_ORDER=['< 1 yr','1–3 yrs','3–5 yrs','5–10 yrs','10+ yrs'];
const TENURE_COLS=['#c0392b','#e67e22','#d9b800','#1a8a5a','#1088A8'];
const REGION_COL={'United Kingdom':'#1088A8','East & Central Africa':'#E05A1E','West Africa':'#8E44AD','Southern & East Africa':'#27AE60','Asia':'#2980B9','Eurasia & North Africa':'#D35400','Latin America & Caribbean':'#16A085'};
const G_COL={'CEO':'#8E44AD','Core Ops':'#1088A8','GF&C':'#E05A1E','I&P':'#27AE60','P&C':'#E67E22'};
const G_FULL={'CEO':'Chief Executive','Core Ops':'Core Operations','GF&C':'Global Fundraising & Communications','I&P':'Influencing & Programmes','P&C':'People & Culture'};
const ORG=GD.org_summary;
const charts={};

function dc(k){if(charts[k]){charts[k].destroy();delete charts[k];}}
function pct(n,t){return t?Math.round(n/t*1000)/10:0;}
function gcat(g){return ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2'].includes(g)?'Senior':['Grade 3','Grade 4','Grade 5'].includes(g)?'Mid':g.startsWith('Grade')?'Junior':'Other';}
function gpill(g){const c=gcat(g);const [bg,cl]=c==='Senior'?['#d0edf4','#0a6880']:c==='Mid'?['#fff7cc','#7a5800']:c==='Junior'?['#fdeee6','#7a2010']:['var(--fog)','var(--sl)'];return `<span class="grade-pill" style="background:${bg};color:${cl}">${g}</span>`;}
function netCol(v){return v>0?'var(--ok)':v<0?'var(--dg)':'var(--sl)';}
function netStr(v){return v>0?'+'+v:String(v);}

// ── PANEL SWITCH ─────────────────────────────────────────────────
let builtPanels={};
function showPanel(id, btn){
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.gbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='org') { if(!builtPanels.org) buildOrgPanel(); }
  else if(id==='dei'){ if(!builtPanels.dei) buildDEIPanel(); }
  else           { if(!builtPanels[id]) buildGroupPanel(id); }
}

// ── HELPERS ───────────────────────────────────────────────────────
function gradeBar(grade_cts, total, maxN){
  const grades = GRADE_ORDER.filter(g=>grade_cts[g]);
  const maxVal = maxN || Math.max(...grades.map(g=>grade_cts[g]));
  return grades.map(g=>{
    const n=grade_cts[g], w=(n/maxVal*100).toFixed(1);
    const c=gcat(g);
    const col=c==='Senior'?'#1088A8':c==='Mid'?'#d9b800':'#E05A1E';
    return `<div class="mini-bar-row">
      <div class="mini-label">${g}</div>
      <div class="mini-track"><div class="mini-fill" style="width:${w}%;background:${col}">${w>=15?n:''}</div></div>
      <div class="mini-val">${n}</div>
    </div>`;
  }).join('');
}

function tenureBar(tenure){
  const vals=TENURE_ORDER.map(b=>tenure[b]||0);
  const tot=vals.reduce((a,b)=>a+b,0);
  if(!tot) return '<div style="font-size:.65rem;color:var(--mi)">No tenure data</div>';
  return TENURE_ORDER.map((b,i)=>{
    const n=vals[i];if(!n) return '';
    const w=(n/tot*100).toFixed(1);
    return `<div class="mini-bar-row">
      <div class="mini-label">${b}</div>
      <div class="mini-track"><div class="mini-fill" style="width:${w}%;background:${TENURE_COLS[i]}">${w>=12?n:''}</div></div>
      <div class="mini-val">${n}</div>
    </div>`;
  }).join('');
}

function countryList(countries, maxN, showGroups){
  const sorted=Object.entries(countries).sort((a,b)=>b[1]-a[1]);
  const maxV=maxN||Math.max(...sorted.map(x=>x[1]));
  return sorted.map(([c,n])=>{
    const w=(n/maxV*100).toFixed(0);
    return `<div class="country-row">
      <div class="country-dot" style="background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div>
      <div class="country-name">${c}</div>
      <div class="country-bar-wrap"><div class="country-bar" style="width:${w}%;background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div></div>
      <div class="country-n-badge">${n}</div>
    </div>`;
  }).join('');
}

const countryRegionMap={};
GD.org_countries.forEach(c=>{ countryRegionMap[c.country]=c.region; });
function getRegion(c){ return countryRegionMap[c]||''; }

let orgRegionFilter='all';
function filterOrgByRegion(r, btn){
  orgRegionFilter=r;
  document.querySelectorAll('.filter-chip').forEach(b=>{b.style.background='var(--fog)';b.style.color='var(--sl)';b.style.borderColor='var(--cl)';});
  btn.style.background='var(--teal)';btn.style.color='#fff';btn.style.borderColor='var(--teal)';
  const q=document.getElementById('org-country-search').value;
  filterOrgTable(q);
}
function filterOrgTable(q){
  const rows=document.querySelectorAll('#org-country-tbody tr.country-main-row');
  rows.forEach(r=>{
    const region=r.dataset.region;
    const textMatch=!q||r.textContent.toLowerCase().includes(q.toLowerCase());
    const regionMatch=orgRegionFilter==='all'||region===orgRegionFilter;
    r.style.display=(textMatch&&regionMatch)?'':'none';
  });
}

function filterCountryList(gk, q){
  const el=document.getElementById(gk+'-country-list');
  const countries=GD.groups[gk].countries;
  const sorted=Object.entries(countries).sort((a,b)=>b[1]-a[1]);
  const filtered=q?sorted.filter(([c])=>c.toLowerCase().includes(q.toLowerCase())):sorted;
  const maxV=Math.max(...sorted.map(x=>x[1]));
  el.innerHTML=filtered.map(([c,n])=>{
    const w=(n/maxV*100).toFixed(0);
    return `<div class="country-row">
      <div class="country-dot" style="background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div>
      <div class="country-name">${c}</div>
      <div class="country-bar-wrap"><div class="country-bar" style="width:${w}%;background:${REGION_COL[getRegion(c)]||'#8ab5c2'}"></div></div>
      <div class="country-n-badge">${n}</div>
    </div>`;
  }).join('');
}

// ── TREE TOGGLE ───────────────────────────────────────────────────
function toggleTree(id){
  const body=document.getElementById(id);
  const chv=document.getElementById(id+'-chv');
  if(!body) return;
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if(chv){ chv.textContent=isOpen?'▶':'▼'; chv.classList.toggle('open',!isOpen); }
  // Also toggle header styling
  const hdr=body.previousElementSibling;
  if(hdr) hdr.classList.toggle('open',!isOpen);
}

function buildDEIHTML(compact){
  const d = DEI;
  const UK_COL='#1088A8'; const GS_COL='#27AE60'; const F_COL='#E91E8C';

  function gauge(current, target, label, note){
    const pct=Math.min(parseFloat(current),100);
    const tpct=Math.min(parseFloat(target),100);
    const ratio=pct/tpct;
    const col=ratio>=1?'#27ae60':ratio>=0.75?'#e67e22':'#c0392b';
    const gap=(target-current).toFixed(1);
    const met=current>=target;
    return `<div style="margin-bottom:.7rem">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.2rem;flex-wrap:wrap;gap:.2rem">

        <span style="font-size:.68rem;font-weight:800;color:${col}">${current}% <span style="font-weight:400;color:var(--sl)">/ target ${target}%</span></span>
      </div>
      <div style="position:relative;height:16px;background:var(--fog);border-radius:5px;overflow:visible;margin-bottom:.18rem">
        <div style="height:100%;width:${Math.min(pct,100)}%;background:${col};border-radius:5px;transition:width .5s"></div>
        <div style="position:absolute;top:-3px;bottom:-3px;left:${Math.min(tpct,100)}%;width:2.5px;background:#0d2b35;border-radius:2px;z-index:2"></div>

      <div style="display:flex;justify-content:space-between;align-items:center">

function buildDEICharts(compact){
  const sfx = compact ? '-compact' : '';
  const d = DEI;
  const bands=['19-25','26-35','36-45','46-60','60+'];
  const agCtx=document.getElementById('dei-age-chart'+sfx);
  if(agCtx){
    dc('dei-age'+sfx);
    charts['dei-age'+sfx]=new Chart(agCtx,{
      type:'bar',
      data:{labels:bands,datasets:[
        {label:'UK', data:bands.map(b=>d.age.UK[b]||0),backgroundColor:'#1088A8',borderRadius:3},
        {label:'Global South',data:bands.map(b=>d.age.GS[b]||0),backgroundColor:'#27AE60',borderRadius:3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:16}},
        scales:{y:{grid:{color:'rgba(16,136,168,.07)'},border:{display:false},ticks:{font:{size:9}}},
                x:{grid:{display:false},border:{display:false},ticks:{font:{size:9}}}},
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:9,padding:6}},
          tooltip:{mode:'index',intersect:false},
          datalabels:{anchor:'end',align:'top',offset:1,color:'var(--ink2)',font:{weight:'bold',size:9},formatter:v=>v>0?v:''}}}
    });
  }

  const empCtx=document.getElementById('dei-emp-chart'+sfx);
  if(empCtx){
    dc('dei-emp'+sfx);
    const empTypes=Object.keys(d.emp_type_gs);
    const empVals=Object.values(d.emp_type_gs);
    charts['dei-emp'+sfx]=new Chart(empCtx,{
      type:'doughnut',
      data:{labels:['UK',...empTypes],
        datasets:[{data:[d.uk_n,...empVals],
          backgroundColor:['#1088A8','#27AE60','#2ECC71','#16A085','#1ABC9C'],
          borderWidth:3,borderColor:'#fff'}]},
      options:{cutout:'62%',animation:{duration:400},
        plugins:{legend:{display:true,position:'right',labels:{font:{size:9},boxWidth:9,padding:5}},
          tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} staff (${pct(c.raw,838)}%)`}},
          datalabels:{color:'#fff',font:{weight:'bold',size:9},formatter:v=>v>15?v:''}}}
    });
  }
}




// GROUP DEMOGRAPHICS FUNCTIONS
// ════════════════════════════════════════════════════════════════
const G_DEMO_AGE_BANDS  = ['19-25','26-35','36-45','46-60','60+'];
const G_DEMO_AGE_COLORS = ['#c0392b','#e67e22','#1088A8','#27ae60','#8e44ad'];
const F_COL = '#E91E8C';
const M_COL = '#1088A8';
const GRADE_ORDER_GD = ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2',
  'Grade 3','Grade 4','Grade 5','Grade 6','Grade 7','Grade 8','Grade 9','Grade 10'];

function safeId(gk){ return gk.replace(/[^a-z0-9]/gi,'_'); }

function switchGroupDemoTab(btn, panelId){
  const card=btn.closest('.card');
  card.querySelectorAll('.demo-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  card.querySelectorAll('.demo-panel').forEach(p=>p.classList.remove('active'));
  const target=card.querySelector('#'+panelId);
  if(target){ target.classList.add('active'); }
  // Identify gk from panelId
  const parts=panelId.split('_');
  // panelId format: gdp-gg-CEO, gdp-ag-Core_Ops etc
  const type=panelId.startsWith('gdp-gg')?'gg':panelId.startsWith('gdp-ag')?'ag':'ov';
  // find gk from DEMO_G keys matching safeId
  const gk=Object.keys(DEMO_G).find(k=>panelId.includes(safeId(k)));
  if(!gk) return;
  const d=DEMO_G[gk];
  if(type==='gg') buildGroupDemoGG(gk, d);
  if(type==='ag') buildGroupDemoAG(gk, d);
  if(type==='ov') buildGroupDemoOV(gk, d);
}

function buildGroupDemoGG(gk, d){
  const el=document.getElementById('gdemo-gg-bars-'+safeId(gk));
  if(!el||!d.gender_grade) return;
  const grades=GRADE_ORDER_GD.filter(g=>d.gender_grade[g]);
  const maxN=Math.max(...grades.map(g=>(d.gender_grade[g].f||0)+(d.gender_grade[g].m||0)));
  el.innerHTML=grades.map(g=>{
    const gd=d.gender_grade[g];
    const f=gd.f||0, m=gd.m||0, tot=f+m;
    const fp=tot?(f/tot*100).toFixed(1):0;
    const mp=tot?(m/tot*100).toFixed(1):0;
    const barW=(tot/maxN*100).toFixed(1);
    const isSr=['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2'].includes(g);
    return `<div style="display:grid;grid-template-columns:85px 1fr 46px;align-items:center;gap:.5rem;padding:.22rem 0">
      <div style="font-size:.7rem;font-weight:${isSr?'700':'500'};color:${isSr?'var(--td)':'var(--ink2)'};text-align:right">${g}</div>
      <div style="height:20px;border-radius:4px;overflow:hidden;display:flex;background:var(--fog)" title="${g}: F=${f}, M=${m}">
        <div style="width:${barW}%;display:flex;overflow:hidden;border-radius:4px;height:100%">
          ${f>0?`<div style="width:${fp}%;background:${F_COL};display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff">${fp>=12?f:''}</div>`:''}
          ${m>0?`<div style="width:${mp}%;background:${M_COL};display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff">${mp>=12?m:''}</div>`:''}
        </div>
      </div>
      <div style="font-size:.67rem;color:var(--sl);font-weight:700;text-align:right">${tot}</div>
    </div>`;
  }).join('')+
  `<div style="display:flex;gap:1rem;margin-top:.4rem;font-size:.66rem;color:var(--sl)">
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${F_COL};margin-right:3px;vertical-align:middle"></span>Female: ${d.female} (${d.female_pct}%)</span>
    <span><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${M_COL};margin-right:3px;vertical-align:middle"></span>Male: ${d.male} (${(100-d.female_pct).toFixed(1)}%)</span>
  </div>`;
}

function buildGroupDemoAG(gk, d){
  const id='gdemo-ag-chart-'+safeId(gk);
  const canvasEl=document.getElementById(id);
  if(!canvasEl||!d.age_grade) return;
  dc(id);
  const grades=GRADE_ORDER_GD.filter(g=>d.age_grade[g]);
  const datasets=G_DEMO_AGE_BANDS.map((age,i)=>({
    label:age,
    data:grades.map(g=>(d.age_grade[g]&&d.age_grade[g][age])||0),
    backgroundColor:G_DEMO_AGE_COLORS[i],
    borderWidth:0,borderRadius:2,
  })).filter(ds=>ds.data.some(v=>v>0));
  charts[id]=new Chart(canvasEl,{
    type:'bar',
    data:{labels:grades,datasets},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      scales:{
        x:{stacked:true,grid:{color:'rgba(16,136,168,.07)'},border:{display:false},ticks:{font:{size:9}}},
        y:{stacked:true,grid:{display:false},border:{display:false},
           ticks:{font:{size:9},color:ctx=>{
             const lbl=grades[ctx.index];
             return ['Grade CEO','Grade Exec','Grade Head','Grade 1','Grade 2'].includes(lbl)?'#0a6880':'#4a7a8a';
           }}}
      },
      plugins:{
        legend:{display:true,position:'bottom',labels:{font:{size:9,family:"'Nunito Sans',sans-serif"},boxWidth:10,padding:8}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw}`}},
        datalabels:{color:'#fff',font:{weight:'bold',size:9},formatter:v=>v>0?v:'',display:ctx=>ctx.dataset.data[ctx.dataIndex]>0}
      },
      layout:{padding:{top:4,right:8}}
    }
  });
}

function buildGroupDemoOV(gk, d){
  const sid=safeId(gk);
  const govEl=document.getElementById('gdemo-ov-gender-'+sid);
  if(govEl){
    const tot=(d.female||0)+(d.male||0);
    const fp=tot?(d.female/tot*100).toFixed(1):0;
    const mp=tot?(d.male/tot*100).toFixed(1):0;
    govEl.innerHTML=`
    <div style="height:22px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:.5rem">
      <div style="width:${fp}%;background:${F_COL};display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff">${fp}%</div>
      <div style="width:${mp}%;background:${M_COL};display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff">${mp}%</div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.69rem">
      <span style="color:${F_COL};font-weight:700">Female: ${d.female} (${fp}%)</span>
      <span style="color:${M_COL};font-weight:700">Male: ${d.male} (${mp}%)</span>
    </div>`;
  }
  const aovEl=document.getElementById('gdemo-ov-age-'+sid);
  if(aovEl&&d.age_totals){
    const totAge=Object.values(d.age_totals).reduce((a,b)=>a+b,0);
    const maxAge=Math.max(...Object.values(d.age_totals));
    aovEl.innerHTML=G_DEMO_AGE_BANDS.filter(b=>d.age_totals[b]).map((b,i)=>{
      const n=d.age_totals[b]||0;
      const w=(n/maxAge*100).toFixed(0);
      const pct=totAge?(n/totAge*100).toFixed(0):0;
      return `<div style="display:grid;grid-template-columns:55px 1fr 50px;align-items:center;gap:.4rem;padding:.2rem 0">
        <div style="font-size:.68rem;font-weight:600;color:var(--ink2)">${b}</div>
        <div style="height:14px;background:var(--fog);border-radius:3px;overflow:hidden">
          <div style="width:${w}%;height:100%;background:${G_DEMO_AGE_COLORS[i]};border-radius:3px"></div>
        </div>
        <div style="font-size:.67rem;font-weight:700;color:var(--sl);text-align:right">${n} (${pct}%)</div>
      </div>`;
    }).join('');
  }
}

function gdToggleTheme(){
  const isDark = document.body.classList.toggle('dark-mode');
  document.getElementById('gd-theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('tf_theme', isDark ? 'dark' : 'light');
}
if(localStorage.getItem('tf_theme')==='dark'){
  document.body.classList.add('dark-mode');
  document.getElementById('gd-theme-btn').textContent='🌙';
}
